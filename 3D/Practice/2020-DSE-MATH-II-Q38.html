<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSE 2020 Q38 Visualizer - Draggable</title>
    <style>
        body { margin: 0; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-layer { 
            position: absolute; top: 15px; left: 15px; 
            background: white; padding: 20px; border-radius: 10px; 
            z-index: 10; max-width: 350px; border-top: 5px solid #0d6efd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #ui-layer p { font-size: 21px; line-height: 1.6; }
        #ui-layer h3 { font-size: 27px; }
        #toggle-btn {
            background: #0d6efd; color: white; border: none; padding: 10px;
            width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        #calc-box { display: none; margin-top: 15px; font-size: 21px; line-height: 1.5; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h3 style="margin:0 0 10px 0;">DSE 2020 Q38</h3>
    <p>ABCDEF is a right triangular prism. P lies on AE. AB=AC=12, AP=9, EP=5, BD=2k.</p>
    <p style="font-size: 11px; color: #666;">🖱️ Left-Click: Rotate | 🖱️ Right-Click: Drag E | 🔍 Scroll: Zoom</p>
    <button id="toggle-btn" onclick="toggleCalc()">Show Calculation Steps</button>
    <div id="calc-box">
        1. <b>Height:</b> AE = 14<br>
        2. <b>Side DP:</b> 13<br>
        3. <b>Side BP:</b> 15
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f2f5);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Initial Points
    let A = new THREE.Vector3(0, 14, 0), B = new THREE.Vector3(12, 14, 0), C = new THREE.Vector3(0, 14, 12);
    let E = new THREE.Vector3(0, 0, 0), F = new THREE.Vector3(12, 0, 0), D = new THREE.Vector3(0, 0, 12);
    let P = new THREE.Vector3(0, 5, 0);

    // Group for the prism lines so we can clear and redraw
    const prismGroup = new THREE.Group();
    scene.add(prismGroup);

    // 1. Initialize Transform Controls (for dragging)
    const transformControls = new THREE.TransformControls(camera, renderer.domElement);
    scene.add(transformControls);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    transformControls.addEventListener('dragging-changed', function (event) {
        controls.enabled = !event.value;
    });

    // 3. Invisible mesh at E to act as a handle
    const meshE = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({visible: false}));
    meshE.position.copy(E);
    scene.add(meshE);
    transformControls.attach(meshE);

    // Fix labels aspect ratio (Bigger Canvas, square-ish Scale)
    const labelGroup = new THREE.Group();
    scene.add(labelGroup);

    function makeLabel(text, pos, color = "black") {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; 
        canvas.height = 512; // Use a square canvas to keep ratio safe
        ctx.font = 'Bold 100px Arial';
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.fillText(text, 256, 256);
        
        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, sizeAttenuation: false }));
        sprite.position.copy(pos);
        sprite.scale.set(0.12, 0.12, 1); // 1:1 ratio so width isn't stretched
        labelGroup.add(sprite);
    }

    function updatePrismGeometry() {
        prismGroup.clear();
        labelGroup.clear();
        
        // Recalculate other points based on E (to keep it a prism)
        const offset = new THREE.Vector3().copy(meshE.position).sub(E);
        [A, B, C, E, F, D, P].forEach(p => p.add(offset));

        const mat = new THREE.LineBasicMaterial({ color: 0x333333 });
        const redMat = new THREE.LineBasicMaterial({ color: 0xff0000 });

        function drawLine(v1, v2, m = mat) {
            prismGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([v1, v2]), m));
        }

        // Redraw Prism Edges
        [ [A,B], [B,C], [C,A], [E,F], [F,D], [D,E], [A,E], [B,F], [C,D] ].forEach(pts => drawLine(pts[0], pts[1]));
        // Redraw Triangle BDP
        [ [B,D], [D,P], [P,B] ].forEach(pts => drawLine(pts[0], pts[1], redMat));

        // Redraw Labels
        makeLabel("A", A); makeLabel("B", B); makeLabel("C", C);
        makeLabel("D", D); makeLabel("E", E); makeLabel("F", F); makeLabel("P", P);
        makeLabel("12", new THREE.Vector3().addVectors(A, B).multiplyScalar(0.5).add(new THREE.Vector3(0,1,0)), "#d63384");
        makeLabel("14", new THREE.Vector3().addVectors(A, E).multiplyScalar(0.5).add(new THREE.Vector3(-1,0,0)), "#d63384");
    }

    camera.position.set(30, 20, 30);
    controls.update();

    function animate() { 
        requestAnimationFrame(animate); 
        E.copy(meshE.position); // Sync E to the draggable handle
        updatePrismGeometry();  // Redraw the geometry every frame
        renderer.render(scene, camera); 
    }
    
    updatePrismGeometry();
    animate();

    function toggleCalc() {
        const box = document.getElementById('calc-box');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }
</script>
</body>
</html>
