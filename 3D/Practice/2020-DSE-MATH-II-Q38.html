<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSE Geometry Visualizer (Flexible Template)</title>
    <style>
        body { margin: 0; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-layer { 
            position: absolute; top: 15px; left: 15px; 
            background: white; padding: 20px; border-radius: 10px; 
            z-index: 10; max-width: 350px; border-top: 5px solid #0d6efd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #ui-layer p { font-size: 21px; line-height: 1.6; }
        #ui-layer h3 { font-size: 27px; }
        #toggle-btn {
            background: #0d6efd; color: white; border: none; padding: 10px;
            width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        #calc-box { 
            display: none; margin-top: 15px; font-size: 21px; 
            line-height: 1.5; border-top: 1px solid #ddd; padding-top: 10px; 
        }
        .step { display: none; margin-bottom: 10px; border-left: 3px solid #0d6efd; padding-left: 10px; }
        #next-btn { 
            display: none; margin-top: 10px; background: #198754; color: white; 
            border: none; padding: 8px; width: 100%; border-radius: 5px; cursor: pointer; 
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <!-- Question Text ************ (UpdateForNewExercise) (1/9) ************ -->
    <h3 style="margin:0 0 10px 0;">DSE 2020 Q38</h3>
    <p>In the figure, ABCDEF is a right triangular prism. P lies on AE. AB=AC=12, AP=9, EP=5, BD=2k. Find the area of ΔBDP.</p>
    <p style="font-size: 11px; color: #666;">🖱️ Left-Click: Rotate | 🖱️ Right-Click: Drag | 🔍 Scroll: Zoom</p>
    
    <button id="toggle-btn" onclick="startSteps()">Show Calculation Steps</button>
    
    <div id="calc-box">
        <div id="step-container"></div>
        <button id="next-btn" onclick="nextStep()">Next Step ➔</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // ==========================================
    // 1. CALCULATION
    // ==========================================

    // Calculation Text ************ () (2/9) ************
    const stepData = [
        "1. <b>In the right-angled ΔABP, </b><br> BP = √(12² + 9²) = 15",
        "2. <b>In the right-angled ΔDEP, </b><br> DP = √(12² + 5²) = 13",
        "3. <b>In ΔBDP, BP = 15, DP = 13, BD = 2k</b>" + "<br>"
            + "Use the Heron's formula." + "<br>"
            + "Let s = (BP + DP + BD)/2 = 14 + k" + "<br>"
            + "Area = √s(s - BP)(s - DP)(s - BD)" + "<br>"
            + "= √(14 + k)(k - 1)(k + 1)(14 - k)" + "<br>"
            + "= √(k² - 1)(196 - k²)"
    ];
    
    // ==========================================
    // 2. MATERIALS & COLORS
    // ==========================================
    
    // (UPDATE colors here if needed)
    const matDefault = new THREE.LineBasicMaterial({ color: 0x333333 }); // Black/Gray lines
    const matTarget  = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 3 }); // Red "Target" lines
    const matActive  = new THREE.LineBasicMaterial({ color: 0x0d6efd, linewidth: 8 }); // Thick Blue "Highlight"
    
    const colorBlueShade = 0x0d6efd; // Blue transparency
    const colorGoldShade = 0xffc107; // Gold target transparency

    // ==========================================
    // 3. SCENE SETUP (Usually stays the same)
    // ==========================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f2f5);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ 
        antialias: true,
        logarithmicDepthBuffer: true // Adds high precision to depth calculations
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Helper functions
    function createLine(v1, v2, material = matDefault) {
        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([v1, v2]), material);
        scene.add(line);
        return line;
    }

    function createTriangle(p1, p2, p3, color, opacity = 0.35) {
        const geom = new THREE.BufferGeometry().setFromPoints([p1, p2, p3]);
        geom.setIndex([0, 1, 2]);
        const mesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ 
            color, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity,
            depthTest: false,   // <--- This is the "Magic" line
            depthWrite: false,        // Prevents the mesh from "cutting holes" in other objects
            // polygonOffset: true,      // Enables a mathematical offset
            // polygonOffsetFactor: -1,  // Pushes the triangle slightly toward the camera
            // polygonOffsetUnits: -1
        }));
        mesh.renderOrder = 1; // Forces the triangle to be drawn on top of the lines
        mesh.visible = false;
        scene.add(mesh);
        return mesh;
    }

    // ==========================================
    // 4. OBJECT DEFINITIONS (Lines and Surfaces)
    // ==========================================

    // Define all Vertex Coordinates here ************ (UpdateForNewExercise) (3/9) ************
    const V = {
        E: new THREE.Vector3(4, 12, -11),
        D: new THREE.Vector3(8, 12, 0),
        F: new THREE.Vector3(0, 12, 0),
        B: new THREE.Vector3(0, 0, 0),
        A: new THREE.Vector3(4, 0, -11),
        C: new THREE.Vector3(8, 0, 0),
        P: new THREE.Vector3(4, 8, -11)
    };
    
    // Static Prism Edges ************ (UpdateForNewExercise) (4/9) ************
    [ [V.A, V.E], [V.D, V.F], [V.E, V.F], [V.D, V.C], [V.C, V.B], [V.A, V.C], [V.F, V.B] ].forEach(pts => createLine(pts[0], pts[1]));
    
    // Dynamic Lines (assigned to variables for highlighting) ************ (UpdateForNewExercise) (5/9) ************
    const lineDE = createLine(V.E, V.D);
    const lineEP = createLine(V.E, V.P);
    const lineAB = createLine(V.B, V.A);
    const lineAP = createLine(V.A, V.P);
    const defaultLines = [lineDE, lineEP, lineAB, lineAP];
    const lineDP = createLine(V.D, V.P, matTarget); // Red "Target" lines
    const lineBP = createLine(V.B, V.P, matTarget); // Red "Target" lines
    const lineBD = createLine(V.D, V.B, matTarget); // Red "Target" lines
    const targetLines  = [lineDP, lineBP, lineBD];
    
    // ==========================================
    // 5. LABELS
    // ==========================================
    function makeLabel(text, pos, color = "black", isLarge = false) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 512;
        ctx.font = isLarge ? 'Bold 120px Arial' : 'Bold 90px Arial';
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.fillText(text, 256, 256);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), sizeAttenuation: false }));
        sprite.position.copy(pos);
        sprite.scale.set(0.15, 0.15, 1);
        scene.add(sprite);
        return sprite;
    }
    
    // Define length labels automatically at midpoints ************ (UpdateForNewExercise) (6/9) ************
    const lengthLabels = [
        { text: "12", pos: new THREE.Vector3().addVectors(V.A, V.B).multiplyScalar(0.5) },
        { text: "12", pos: new THREE.Vector3().addVectors(V.A, V.C).multiplyScalar(0.5) },
        { text: "5",  pos: new THREE.Vector3().addVectors(V.E, V.P).multiplyScalar(0.5) },
        { text: "9",  pos: new THREE.Vector3().addVectors(V.A, V.P).multiplyScalar(0.5) },
        { text: "2k", pos: new THREE.Vector3().addVectors(V.D, V.B).multiplyScalar(0.5) }
    ];
    // Generate Length Labels
    lengthLabels.forEach(l => makeLabel(l.text, l.pos, "#d63384")); // PINK
    
    // Labels used in the calculation, hidden at the beginning ************ (UpdateForNewExercise) (7/9) ************
    const lineDELabel = makeLabel("12", new THREE.Vector3().addVectors(V.D, V.E).multiplyScalar(0.5), "#0d6efd"); // BLUE
    const lineBPLabel = makeLabel("15", new THREE.Vector3().addVectors(V.B, V.P).multiplyScalar(0.5), "#0d6efd"); // BLUE
    const lineDPLabel = makeLabel("13", new THREE.Vector3().addVectors(V.D, V.P).multiplyScalar(0.5), "#0d6efd"); // BLUE
    const lineLabelsForCalculation = [lineDELabel, lineBPLabel, lineDPLabel];
    // Immediately hide them
    lineLabelsForCalculation.forEach(lab => lab.visible = false);

    // Triangle Surfaces ************ (UpdateForNewExercise) (8/9) ************
    const meshABPBlue = createTriangle(V.A, V.B, V.P, colorBlueShade);
    const meshDEPBlue = createTriangle(V.D, V.E, V.P, colorBlueShade);
    const meshBDPBlue = createTriangle(V.B, V.D, V.P, colorBlueShade);
    const blueMeshes   = [meshABPBlue, meshDEPBlue, meshBDPBlue];
    const meshBDPGold = createTriangle(V.B, V.D, V.P, colorGoldShade, 0.4);    
    const targetMeshes = [meshBDPGold];
    meshBDPGold.visible = true; // Show target initially

    // Generate Vertex Labels
    // Object.keys(V).forEach(key => makeLabel(key, V[key].clone().add(new THREE.Vector3(0, key === 'B' || key === 'A' || key === 'C' ? -0.8 : 0.8, 0))));
    Object.keys(V).forEach(key => makeLabel(key, V[key].clone().add(new THREE.Vector3(0, 0, 0))));

    // ==========================================
    // 6. INTERACTIVE LOGIC
    // ==========================================
    
    function updateHighlights(step) {
        // Reset Everything
        // 1. Reset all lines to their "Standard" look
        defaultLines.forEach(l => l.material = matDefault);
        
        // 2. Reset all "Target" lines to Red
        targetLines.forEach(l => l.material = matTarget);
        
        // 3. Hide all Blue highlight surfaces
        blueMeshes.forEach(m => m.visible = false);
        
        // 4. Handle the Gold Target visibility via the array
        targetMeshes.forEach(m => m.visible = (step === 0));

        // 5. Hide all labels before the next step's calculation
        lineLabelsForCalculation.forEach(lab => lab.visible = false);
        
        // Reset Text Colors
        for (let i = 1; i <= stepData.length; i++) {
            const div = document.getElementById('s' + i);
            if (div) div.style.color = "black";
        }

        // (UPDATE logic for each step here) ************ (UpdateForNewExercise) (9/9) ************
        if (step === 1) {
            lineAB.material = lineAP.material = lineBP.material = matActive;
            meshABPBlue.visible = true;
            document.getElementById('s1').style.color = "#0d6efd";
        } else if (step === 2) {
            lineDE.material = lineEP.material = lineDP.material = matActive;
            meshDEPBlue.visible = true;
            lineDELabel.visible = true;
            document.getElementById('s2').style.color = "#0d6efd";
        } else if (step === 3) {
            lineBP.material = lineDP.material = lineBD.material = matActive;
            meshBDPBlue.visible = true;
            lineBPLabel.visible = lineDPLabel.visible = true;
            document.getElementById('s3').style.color = "#0d6efd";
        }
    }

    // Standard UI and Animation Loop
    camera.position.set(-23, 23, 15);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(6, 6, -6);
    controls.update();

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    animate();

    // Step Management
    const container = document.getElementById('step-container');
    stepData.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'step'; div.id = 's' + (i + 1); div.innerHTML = text;
        container.appendChild(div);
    });

    let currentStep = 0;
    function startSteps() {
        document.getElementById('calc-box').style.display = 'block';
        document.getElementById('toggle-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
        currentStep = 0; nextStep();
    }

    function nextStep() {
        currentStep++;
        if (currentStep <= stepData.length) {
            document.getElementById('s' + currentStep).style.display = 'block';
            updateHighlights(currentStep);
        }
        if (currentStep === stepData.length) {
            const btn = document.getElementById('next-btn');
            btn.innerHTML = "Reset ↺"; btn.style.background = "#6c757d";
            btn.onclick = resetSteps;
        }
    }

    function resetSteps() {
        for (let i = 1; i <= stepData.length; i++) document.getElementById('s' + i).style.display = 'none';
        document.getElementById('calc-box').style.display = 'none';
        document.getElementById('toggle-btn').style.display = 'block';
        currentStep = 0; updateHighlights(0);
        const btn = document.getElementById('next-btn');
        btn.innerHTML = "Next Step ➔"; btn.style.background = "#198754";
        btn.onclick = nextStep;
    }
</script>
</body>
</html>
