<!-- Update by myself based on 2020-DSE-MATH-II-Q38.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSE Geometry Visualizer (Flexible Template)</title>
    <style>
        body { margin: 0; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-layer { 
            position: absolute; top: 15px; left: 15px; 
            background: white; padding: 20px; border-radius: 10px; 
            z-index: 10; max-width: 350px; border-top: 5px solid #0d6efd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #ui-layer p { font-size: 21px; line-height: 1.6; }
        #ui-layer h3 { font-size: 27px; }
        #toggle-btn {
            background: #0d6efd; color: white; border: none; padding: 10px;
            width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        #calc-box { 
            display: none; margin-top: 15px; font-size: 21px; 
            line-height: 1.5; border-top: 1px solid #ddd; padding-top: 10px; 
        }
        .step { display: none; margin-bottom: 10px; border-left: 3px solid #0d6efd; padding-left: 10px; }
        #next-btn { 
            display: none; margin-top: 10px; background: #198754; color: white; 
            border: none; padding: 8px; width: 100%; border-radius: 5px; cursor: pointer; 
        }
        #debug-info {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            pointer-events: none; /* Let clicks pass through to the 3D scene */
            border: 1px solid #ccc;
            z-index: 20;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <!-- Question Text ************ (UpdateForNewExercise) (1/10) ************ -->
    <h3 style="margin:0 0 10px 0;">2526 S5UT4 MCQ6</h3>
    In the figure, ABCDEFGH is a cuboid. P lies on AF . If AB=4, AD=12, AP=6, GP=k, CG=3k. Find the area of ΔCGP in terms of k.
    <button id="reset-cam-btn" style="margin-top: 10px; background: #6c757d; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="resetCamera()">Reset Camera 🎥</button>
    <p style="font-size: 11px; color: #666;">🖱️ Left-Click: Rotate | 🖱️ Right-Click: Drag | 🔍 Scroll: Zoom</p>

    <button id="toggle-btn" onclick="startSteps()">Show Calculation Steps</button>
    
    <div id="calc-box">
        <div id="step-container"></div>
        <button id="next-btn" onclick="nextStep()">Next Step ➔</button>
    </div>
</div>
<div id="debug-info">
    Camera: (0, 0, 0)<br>
    Target: (0, 0, 0)
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // ==========================================
    // 1. CALCULATION
    // ==========================================

    // Calculation Text ************ (UpdateForNewExercise) (2/10) ************
    const stepData = [
        "1. <b>In the right-angled ΔABP, </b><br> BP = √(12² + 9²) = 15",
        "2. <b>In the right-angled ΔDEP, </b><br> DP = √(12² + 5²) = 13",
        "3. <b>In ΔBDP, BP = 15, DP = 13, BD = 2k</b>" + "<br>"
            + "Use the Heron's formula." + "<br>"
            + "Let s = (BP + DP + BD)/2 = 14 + k" + "<br>"
            + "Area = √s(s - BP)(s - DP)(s - BD)" + "<br>"
            + "= √(14 + k)(k - 1)(k + 1)(14 - k)" + "<br>"
            + "= √(k² - 1)(196 - k²)"
    ];
    
    // ==========================================
    // 2. MATERIALS & COLORS
    // ==========================================
    
    // (UPDATE colors here if needed)
    const matDefault = new THREE.LineBasicMaterial({ color: 0x333333 }); // Black/Gray lines
    const matTarget  = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 3 }); // Red "Target" lines
    const matActive  = new THREE.LineBasicMaterial({ color: 0x0d6efd, linewidth: 8 }); // Thick Blue "Highlight"
    
    const colorBlueShade = 0x0d6efd; // Blue transparency
    const colorGoldShade = 0xffc107; // Gold target transparency

    // ==========================================
    // 3. SCENE SETUP (Usually stays the same)
    // ==========================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f2f5);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ 
        antialias: true,
        logarithmicDepthBuffer: true // Adds high precision to depth calculations
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Helper functions
    function createLine(v1, v2, material = matDefault) {
        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([v1, v2]), material);
        scene.add(line);
        return line;
    }

    function createRightAngle(vertex, p1, p2, size = 1.0) {
        const d1 = new THREE.Vector3().subVectors(p1, vertex).normalize().multiplyScalar(size);
        const d2 = new THREE.Vector3().subVectors(p2, vertex).normalize().multiplyScalar(size);
        
        const corner1 = vertex.clone().add(d1);
        const corner2 = vertex.clone().add(d1).add(d2);
        const corner3 = vertex.clone().add(d2);
        
        const geom = new THREE.BufferGeometry().setFromPoints([corner1, corner2, corner3]);
        const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x000000 }));
        line.visible = false;
        scene.add(line);
        return line;
    }

    function createTriangle(p1, p2, p3, color, opacity = 0.35) {
        const geom = new THREE.BufferGeometry().setFromPoints([p1, p2, p3]);
        geom.setIndex([0, 1, 2]);
        const mesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ 
            color, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity,
            depthTest: false,   // <--- This is the "Magic" line
            depthWrite: false,        // Prevents the mesh from "cutting holes" in other objects
            // polygonOffset: true,      // Enables a mathematical offset
            // polygonOffsetFactor: -1,  // Pushes the triangle slightly toward the camera
            // polygonOffsetUnits: -1
        }));
        mesh.renderOrder = 1; // Forces the triangle to be drawn on top of the lines
        mesh.visible = false;
        scene.add(mesh);
        return mesh;
    }

    // ==========================================
    // 4. OBJECT DEFINITIONS (Lines and Surfaces)
    // ==========================================

    // Define all Vertex Coordinates here ************ (UpdateForNewExercise) (3/10) ************
    const V = {
        G: new THREE.Vector3(0, 0, 0),
        F: new THREE.Vector3(-8, 0, 0),
        H: new THREE.Vector3(0, 0, 6),
        E: new THREE.Vector3(-8, 0, 6),
        A: new THREE.Vector3(-8, 8, 0),
        B: new THREE.Vector3(0, 8, 0),
        C: new THREE.Vector3(0, 8, 6),
        D: new THREE.Vector3(-8, 8, 6),
        P: new THREE.Vector3(-8, 2.5, 0),
    };
    
    // Static Prism Edges ************ (UpdateForNewExercise) (4/10) ************
    [ [V.A, V.B], [V.A, V.D], [V.C, V.D], [V.B, V.C], [V.A, V.F], [V.D, V.E], [V.C, V.H], [V.B, V.G], [V.E, V.F], [V.E, V.H], [V.F, V.G], [V.G, V.H], [V.C, V.G], [V.C, V.P], [V.G, V.P] ].forEach(pts => createLine(pts[0], pts[1]));
    
    // Dynamic Lines (assigned to variables for highlighting) ************ (UpdateForNewExercise) (5/10) ************
    const lineAC = createLine(V.A, V.C);
    const lineCD = createLine(V.C, V.D);
    const lineAD = createLine(V.A, V.D);
    const lineAP = createLine(V.A, V.P);
    const defaultLines = [lineAC, lineCD, lineAD, lineAP];
    const lineCP = createLine(V.C, V.P, matTarget); // Red "Target" lines
    const lineGP = createLine(V.G, V.P, matTarget); // Red "Target" lines
    const lineCG = createLine(V.C, V.G, matTarget); // Red "Target" lines
    const targetLines  = [lineCP, lineGP, lineCG];

    // Define Right Angle Symbols ************ (UpdateForNewExercise) (6/10) ************
    const angleADC = createRightAngle(V.A, V.D, V.C); // Right angle at D
    const angleCAP = createRightAngle(V.C, V.A, V.P); // Right angle at A
    const angleSymbols = [angleADC, angleCDP];
    
    // ==========================================
    // 5. LABELS
    // ==========================================
    function makeLabel(text, pos, color = "black", isLarge = false) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512; canvas.height = 512;
        ctx.font = isLarge ? 'Bold 120px Arial' : 'Bold 90px Arial';
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.fillText(text, 256, 256);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), sizeAttenuation: false }));
        sprite.position.copy(pos);
        sprite.scale.set(0.15, 0.15, 1);
        scene.add(sprite);
        return sprite;
    }
    
    // Define length labels automatically at midpoints ************ (UpdateForNewExercise) (7/10) ************
    const lengthLabels = [
        { text: "12", pos: new THREE.Vector3().addVectors(V.A, V.D).multiplyScalar(0.5) },
        { text: "6", pos: new THREE.Vector3().addVectors(V.A, V.P).multiplyScalar(0.5) },
        { text: "4",  pos: new THREE.Vector3().addVectors(V.A, V.B).multiplyScalar(0.5) },
        { text: "k",  pos: new THREE.Vector3().addVectors(V.G, V.P).multiplyScalar(0.5) },
        { text: "3k", pos: new THREE.Vector3().addVectors(V.C, V.G).multiplyScalar(0.5) }
    ];
    // Generate Length Labels
    lengthLabels.forEach(l => makeLabel(l.text, l.pos, "#d63384")); // PINK
    
    // Labels used in the calculation, hidden at the beginning ************ (UpdateForNewExercise) (8/10) ************
    const lineACLabel = makeLabel("√160", new THREE.Vector3().addVectors(V.A, V.C).multiplyScalar(0.5), "#0d6efd"); // BLUE
    const lineCPLabel = makeLabel("14", new THREE.Vector3().addVectors(V.C, V.P).multiplyScalar(0.5), "#0d6efd"); // BLUE
    const lineLabelsForCalculation = [lineACLabel, lineCPLabel];
    // Immediately hide them
    lineLabelsForCalculation.forEach(lab => lab.visible = false);

    // Triangle Surfaces ************ (UpdateForNewExercise) (9/10) ************
    const meshACDBlue = createTriangle(V.A, V.C, V.D, colorBlueShade);
    const meshACPBlue = createTriangle(V.A, V.C, V.P, colorBlueShade);
    const meshCGPBlue = createTriangle(V.G, V.G, V.P, colorBlueShade);
    const blueMeshes   = [meshACDBlue, meshACPBlue, meshCGPBlue];
    const meshCGPGold = createTriangle(V.C, V.G, V.P, colorGoldShade, 0.4);    
    const targetMeshes = [meshCGPGold];
    meshCGPGold.visible = true; // Show target initially

    // Generate Vertex Labels
    // Object.keys(V).forEach(key => makeLabel(key, V[key].clone().add(new THREE.Vector3(0, key === 'B' || key === 'A' || key === 'C' ? -0.8 : 0.8, 0))));
    Object.keys(V).forEach(key => makeLabel(key, V[key].clone().add(new THREE.Vector3(0, 0, 0))));

    // ==========================================
    // 6. INTERACTIVE LOGIC
    // ==========================================
    
    function updateHighlights(step) {
        // Reset Everything
        // 1. Reset all lines to their "Standard" look
        defaultLines.forEach(l => l.material = matDefault);
        
        // 2. Reset all "Target" lines to Red
        targetLines.forEach(l => l.material = matTarget);
        
        // 3. Hide all Blue highlight surfaces
        blueMeshes.forEach(m => m.visible = false);
        
        // 4. Handle the Gold Target visibility via the array
        targetMeshes.forEach(m => m.visible = (step === 0));

        // 5. Hide all labels before the next step's calculation
        lineLabelsForCalculation.forEach(lab => lab.visible = false);

        // 6. Reset Right Angles to hidden
        angleSymbols.forEach(symbol => symbol.visible = false);
                
        // Reset Text Colors
        for (let i = 1; i <= stepData.length; i++) {
            const div = document.getElementById('s' + i);
            if (div) div.style.color = "black";
        }

        // (UPDATE logic for each step here) ************ (UpdateForNewExercise) (10/10) ************
        if (step === 1) {
            lineAC.material = lineAD.material = lineCD.material = matActive;
            meshACDBlue.visible = true;
            angleADC.visible = true; // Show ∠ADC
            document.getElementById('s1').style.color = "#0d6efd";
        } else if (step === 2) {
            lineAC.material = lineAP.material = lineCP.material = matActive;
            meshACPBlue.visible = true;
            lineACLabel.visible = true;
            angleCAP.visible = true; // Show ∠CAP
            document.getElementById('s2').style.color = "#0d6efd";
        } else if (step === 3) {
            lineCP.material = lineCG.material = lineGP.material = matActive;
            meshCGPBlue.visible = true;
            lineCPLabel.visible = true;
            document.getElementById('s3').style.color = "#0d6efd";
        }
    }

    // Standard UI and Animation Loop
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    // Call your function to set the initial position
    resetCamera();

    // function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    // animate();
    // Animation Loop with Real-time Updates
    function animate() {
        requestAnimationFrame(animate);
        
        // Update the Debug Box Text
        const debugBox = document.getElementById('debug-info');
        if (debugBox && controls) {
            const cp = camera.position;
            const ct = controls.target;
            debugBox.innerHTML = `
                <b style="color:#0d6efd">CAMERA:</b><br>
                x: ${cp.x.toFixed(1)}<br>
                y: ${cp.y.toFixed(1)}<br>
                z: ${cp.z.toFixed(1)}<br>
                <hr style="margin:5px 0; border:0; border-top:1px solid #eee">
                <b style="color:#198754">TARGET:</b><br>
                x: ${ct.x.toFixed(1)}<br>
                y: ${ct.y.toFixed(1)}<br>
                z: ${ct.z.toFixed(1)}
            `;
        }
    
        renderer.render(scene, camera);
    }
    animate();

    // Step Management
    const container = document.getElementById('step-container');
    stepData.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'step'; div.id = 's' + (i + 1); div.innerHTML = text;
        container.appendChild(div);
    });

    let currentStep = 0;
    function startSteps() {
        document.getElementById('calc-box').style.display = 'block';
        document.getElementById('toggle-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
        currentStep = 0; nextStep();
    }

    function nextStep() {
        currentStep++;
        if (currentStep <= stepData.length) {
            document.getElementById('s' + currentStep).style.display = 'block';
            updateHighlights(currentStep);
        }
        if (currentStep === stepData.length) {
            const btn = document.getElementById('next-btn');
            btn.innerHTML = "Reset ↺"; btn.style.background = "#6c757d";
            btn.onclick = resetSteps;
        }
    }

    function resetSteps() {
        for (let i = 1; i <= stepData.length; i++) document.getElementById('s' + i).style.display = 'none';
        document.getElementById('calc-box').style.display = 'none';
        document.getElementById('toggle-btn').style.display = 'block';
        currentStep = 0; updateHighlights(0);
        const btn = document.getElementById('next-btn');
        btn.innerHTML = "Next Step ➔"; btn.style.background = "#198754";
        btn.onclick = nextStep;
    }
    
    function resetCamera() {
        // Reset camera position to your initial settings
        camera.position.set(-20, 15, 10);
        
        // Reset the pivot point for OrbitControls
        controls.target.set(5, 4, -6);
        
        // Crucial: update the controls so they realize the camera has moved
        controls.update();
    }
</script>
</body>
</html>
