<!DOCTYPE html>
<html>
<head>
    <title>3D Math Model</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. Setup the Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Create a 3D Figure (A Cube for now)
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshNormalMaterial(); // Colorful sides to see rotation
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        camera.position.z = 5;

        // 3. Add User Rotation Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // 4. The Animation Loop (to keep drawing the frame)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for smooth rotation
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
