<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S5 Ch10 - Under Construction</title>
    <style>
        /* This keeps the design very light and fast */
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Centered in the middle of the screen */
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }

        .main-container {
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
        }

        /* The cute emoji figure */
        .figure {
            font-size: 80px; /* Big and friendly */
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        /* The cute back button */
        .back-button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.2s;
        }

        .back-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <span class="figure">🤖🚧</span>
        
        <h1>Building the DSE Hub!</h1>
        <p>This section is currently under construction. Please check back soon.</p>
        
        <a href="index.html" class="back-button">← Go Back</a>
    </div>

</body>
</html>
