<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution Walkthrough | MyMath</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .split-container { display: flex; height: 100vh; }
        .canvas-side { flex: 1; background: #eee; position: relative; } 
        .content-side { flex: 1; padding: 40px; overflow-y: auto; background: white; border-left: 1px solid #ddd; }
        .step { margin-bottom: 30px; border-left: 4px solid #007bff; padding-left: 15px; }
        .math { font-style: italic; font-family: "Times New Roman", serif; background: #f9f9f9; padding: 10px; display: block; }
        .back-link { margin-bottom: 20px; display: block; text-decoration: none; color: #007bff; font-weight: bold; }
        
        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            .canvas-side, .content-side { height: 50vh; flex: none; }
        }
    </style>
</head>
<body>

    <div class="split-container">
        <div class="canvas-side" id="threejs-container"></div>

        <div class="content-side">
            <a href="index.html" class="back-link">← Back to List</a>
            <h1>2020 DSE Paper II Q38</h1>
            
            <div class="step">
                <h3>Step 1: Identify the Angle</h3>
                <p>The angle between the line $VA$ and the base $ABCD$ is $\angle VAO$.</p>
            </div>

            <div class="step">
                <h3>Step 2: Calculate Height</h3>
                <p class="math">Height = 10 \sin(60^\circ)</p>
            </div>

            <div class="step">
                <h3>Step 3: Final Answer</h3>
                <p>The volume is 400 cubic units.</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // CONFIGURATION: Set your shape here ('pyramid', 'cube', or 'prism')
        const shapeType = 'pyramid'; 

        let scene, camera, renderer, controls;
        const container = document.getElementById('threejs-container');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xeeeeee);

            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(5, 5, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            let geometry;
            if (shapeType === 'cube') {
                geometry = new THREE.BoxGeometry(4, 4, 4);
            } else if (shapeType === 'prism') {
                geometry = new THREE.CylinderGeometry(2, 2, 5, 3);
            } else {
                geometry = new THREE.ConeGeometry(3, 5, 4); // Default Pyramid
            }

            const material = new THREE.MeshPhongMaterial({ 
                color: 0x007bff, 
                transparent: true, 
                opacity: 0.7, 
                flatShading: true 
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
            mesh.add(line);
            
            if (shapeType === 'prism') mesh.rotation.x = Math.PI / 2;
            scene.add(mesh);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
