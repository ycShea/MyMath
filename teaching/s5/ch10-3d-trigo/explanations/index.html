<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Explanations | MyMath</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
        .year-group { margin-top: 30px; border-bottom: 2px solid #007bff; padding-bottom: 5px; color: #007bff; }
        .problem-link {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: white; margin: 10px 0;
            border-radius: 8px; text-decoration: none; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .problem-link:hover { transform: translateX(10px); background: #eef6ff; }
        .tag { font-size: 0.8rem; padding: 4px 8px; background: #eee; border-radius: 4px; color: #666; }
        .loading { text-align: center; color: #999; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" style="text-decoration: none;">← Back to Menu</a>
    <h1>Problem Explanations</h1>
    
    <div id="content-area">
        <p class="loading">Loading problems from database...</p>
    </div>
</div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSnkbeTpuYjuWRdy7IW9DZUI8tcwrl98OLKMe3nXNzKB1HBvpQzpmSqf9NlmX0b7RJ5y8AIK9GI8AL/pub?gid=0&single=true&output=csv";

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const csvData = await response.text();
            
            // 1. Split by any newline (\n or \r\n)
            const rows = csvData.split(/\r?\n/).map(row => row.split(','));
            
            console.log("Data received:", rows); // Debugging: Press F12 to see this

            rows.shift(); // Remove header

            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = ""; 

            const categories = {};
            rows.forEach(row => {
                // 2. Clean quotes and whitespace from each cell
                const title = row[0]?.replace(/"/g, '').trim();
                const category = row[1]?.replace(/"/g, '').trim();
                const tag = row[2]?.replace(/"/g, '').trim();
                const url = row[3]?.replace(/"/g, '').trim();

                if (!title || !category) return; 

                if (!categories[category]) {
                    categories[category] = [];
                }
                categories[category].push({ title, tag, url });
            });

            if (Object.keys(categories).length === 0) {
                contentArea.innerHTML = "<p>No data found in the spreadsheet.</p>";
                return;
            }

            for (const category in categories) {
                const sectionHeader = document.createElement('h2');
                sectionHeader.className = "year-group";
                sectionHeader.innerText = category;
                contentArea.appendChild(sectionHeader);

                categories[category].forEach(item => {
                    const link = document.createElement('a');
                    link.className = "problem-link";
                    link.href = item.url; 
                    link.innerHTML = `
                        <span>${item.title}</span>
                        <span class="tag">${item.tag}</span>
                    `;
                    contentArea.appendChild(link);
                });
            }
        } catch (error) {
            console.error("Fetch error:", error);
            document.getElementById('content-area').innerHTML = "<p>Error: " + error.message + "</p>";
        }
    }

    fetchData();
</script>

</body>
</html>
