<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024 DSE Paper I Q18 Solution</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .split-container { display: flex; height: 100vh; }
        .canvas-side { flex: 1; background: #f0f2f5; position: relative; }
        .content-side { flex: 1; padding: 30px; overflow-y: auto; background: white; border-left: 1px solid #ddd; }
        
        .question-summary { 
            background: #eef6ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #007bff;
        }
        .part-container { margin-bottom: 15px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .part-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #fafafa; }
        .solution-content { display: none; padding: 20px; background: #fff; border-top: 1px solid #eee; }
        .math-block { font-family: "Times New Roman", serif; font-size: 1.1rem; color: #d63384; margin: 10px 0; }
        
        .btn-show { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #reset-cam-btn { background: #fd7e14; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .label {
            position: absolute; background: transparent; color: #000; font-weight: bold;
            font-size: 24px; pointer-events: none; z-index: 100;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.9); transform: translate(-50%, -50%);
        }

        #debug-info {
            position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.8);
            padding: 10px; border-radius: 8px; font-family: monospace; font-size: 14px;
            pointer-events: none; border: 1px solid #ccc; z-index: 20;
        }
    </style>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div class="split-container">
        <div class="canvas-side" id="threejs-container">
            <div id="debug-info"></div>
        </div>

        <div class="content-side">
            <h1>2024 DSE Paper I Q18</h1>
            <div class="question-summary">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>$PQRS$ quadrilateral: $PQ=12, PS=10, QR=13$.</strong></div>
                    <button class="btn-show" onclick="drawFigure()">Show Figure</button>
                </div>
                <button id="reset-cam-btn" onclick="resetCamera()">Reset Camera 🎥</button>
            </div>

            <div class="part-container">
                <div class="part-header">
                    <span><strong>(a)</strong> Length of $QS$</span>
                    <button class="btn-show" onclick="toggle('sol-a')">Solution</button>
                </div>
                <div id="sol-a" class="solution-content">
                    <p class="math-block">$QS = \sqrt{12^2 + 10^2 - 2(12)(10)\cos(82^\circ)} \approx 14.5$</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        function toggle(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
        }

        // ==========================================
        // 1. SCENE SETUP
        // ==========================================
        const container = document.getElementById('threejs-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f2f5);
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.9));

        // ==========================================
        // 2. GEOMETRY DEFINITIONS (Grouped)
        // ==========================================
        const scale = 0.6; 
        const rad82 = 82 * Math.PI / 180;
        
        const V = {
            P: new THREE.Vector3(0, 0, 0),
            S: new THREE.Vector3(10 * scale, 0, 0),
            Q: new THREE.Vector3(12 * scale * Math.cos(rad82), 12 * scale * Math.sin(rad82), 0),
            R: new THREE.Vector3(16 * scale, 5 * scale, 0)
        };

        const config = {
            lines: [ [V.P, V.Q], [V.Q, V.R], [V.R, V.S], [V.S, V.P], [V.Q, V.S] ],
            surfaces: [ { p: [V.P, V.S, V.Q], col: 0x0d6efd }, { p: [V.S, V.R, V.Q], col: 0x0d6efd } ],
            labels: ["P", "Q", "R", "S"]
        };

        let activeLabels = {};

        // ==========================================
        // 3. HELPER FUNCTIONS
        // ==========================================
        function makeLabel(text) {
            const div = document.createElement('div');
            div.className = 'label';
            div.textContent = text;
            container.appendChild(div);
            return div;
        }

        function createTriangle(p1, p2, p3, color) {
            const geom = new THREE.BufferGeometry().setFromPoints([p1, p2, p3]);
            geom.setIndex([0, 1, 2]);
            const mesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ 
                color, side: THREE.DoubleSide, transparent: true, opacity: 0.4,
                depthTest: false, depthWrite: false
            }));
            mesh.renderOrder = 1;
            scene.add(mesh);
        }

        function drawFigure() {
            // Clear existing
            scene.children.filter(c => c.type === "Mesh" || c.type === "Line").forEach(c => scene.remove(c));
            Object.values(activeLabels).forEach(l => l.remove());

            // Add Surfaces
            config.surfaces.forEach(s => createTriangle(s.p[0], s.p[1], s.p[2], s.col));

            // Add Lines
            const matLine = new THREE.LineBasicMaterial({ color: 0x333333, linewidth: 2 });
            config.lines.forEach(pair => {
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pair), matLine);
                line.renderOrder = 2;
                scene.add(line);
            });

            // Add Labels
            config.labels.forEach(name => { activeLabels[name] = makeLabel(name); });
        }

        function resetCamera() {
            camera.position.set(10, 18, 17);
            controls.target.set(3, 3, 0);
            controls.update();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Debug Info
            const debugBox = document.getElementById('debug-info');
            if (debugBox) {
                const cp = camera.position, ct = controls.target;
                debugBox.innerHTML = `<b style="color:#0d6efd">CAMERA:</b> x:${cp.x.toFixed(1)} y:${cp.y.toFixed(1)} z:${cp.z.toFixed(1)}<br>` +
                                    `<b style="color:#198754">TARGET:</b> x:${ct.x.toFixed(1)} y:${ct.y.toFixed(1)} z:${ct.z.toFixed(1)}`;
            }
            
            // Label Projection
            const widthHalf = container.clientWidth / 2, heightHalf = container.clientHeight / 2;
            for (let key in activeLabels) {
                const vector = V[key].clone().project(camera);
                activeLabels[key].style.left = (vector.x * widthHalf + widthHalf) + 'px';
                activeLabels[key].style.top = (-(vector.y * heightHalf) + heightHalf) + 'px';
                activeLabels[key].style.display = vector.z < 1 ? 'block' : 'none';
            }
            renderer.render(scene, camera);
        }

        resetCamera();
        animate();
    </script>
</body>
</html>
