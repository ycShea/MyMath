<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2024 DSE Q18 - Corrected Visuals</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .split-container { display: flex; height: 100vh; }
        .canvas-side { flex: 1; background: #f0f0f0; position: relative; }
        .content-side { flex: 1; padding: 20px; background: white; border-left: 1px solid #ddd; }
        
        /* Updated Label Styling: No background square, clean text */
        .label {
            position: absolute;
            background: transparent; /* Removes the white box */
            color: #000;
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            z-index: 100;
            text-shadow: 1px 1px 2px white; /* Makes text readable against any color */
            transform: translate(-50%, -50%);
        }

        .btn-show { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="split-container">
        <div class="canvas-side" id="threejs-container"></div>
        <div class="content-side">
            <h1>2024 DSE Q18</h1>
            <button class="btn-show" onclick="drawQuadrilateral()">Draw Figure</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const container = document.getElementById('threejs-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // 1. FIXED: Added polygonOffset to prevent flashing (Z-fighting)
        const material = new THREE.MeshPhongMaterial({ 
            color: 0x007bff, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.5,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        });
        
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(10, 20, 10);
        scene.add(light);

        const rad82 = 82 * Math.PI / 180;
        const pts = {
            P: new THREE.Vector3(0, 0, 0),
            S: new THREE.Vector3(10, 0, 0),
            Q: new THREE.Vector3(12 * Math.cos(rad82), 12 * Math.sin(rad82), 0),
            R: new THREE.Vector3(16, 6, 0)
        };

        let labels = {};

        function createLabel(text) {
            const div = document.createElement('div');
            div.className = 'label';
            div.textContent = text;
            container.appendChild(div);
            return div;
        }

        function updateLabels() {
            const widthHalf = container.clientWidth / 2;
            const heightHalf = container.clientHeight / 2;

            for (let key in labels) {
                const vector = pts[key].clone().project(camera);
                labels[key].style.left = (vector.x * widthHalf + widthHalf) + 'px';
                labels[key].style.top = (-(vector.y * heightHalf) + heightHalf) + 'px';
                labels[key].style.display = (vector.z < 1) ? 'block' : 'none';
            }
        }

        function drawQuadrilateral() {
            // Clear old objects
            scene.children.filter(c => c.type === "Mesh" || c.type === "LineSegments").forEach(c => scene.remove(c));
            Object.values(labels).forEach(l => l.remove());

            const vertices = new Float32Array([
                pts.P.x, pts.P.y, pts.P.z, pts.S.x, pts.S.y, pts.S.z, pts.Q.x, pts.Q.y, pts.Q.z,
                pts.S.x, pts.S.y, pts.S.z, pts.R.x, pts.R.y, pts.R.z, pts.Q.x, pts.Q.y, pts.Q.z
            ]);

            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            
            const mesh = new THREE.Mesh(geom, material);
            const wireframe = new THREE.LineSegments(new THREE.EdgesGeometry(geom), lineMaterial);
            
            scene.add(mesh, wireframe);

            labels = { P: createLabel('P'), Q: createLabel('Q'), R: createLabel('R'), S: createLabel('S') };
            controls.target.set(8, 3, 0);
            controls.update();
        }

        function animate() {
            requestAnimationFrame(animate);
            updateLabels();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
