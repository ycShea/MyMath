<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSE Geometry Visualizer - Quadrilateral PQRS</title>
    <style>
        body { margin: 0; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui-layer { 
            position: absolute; top: 15px; left: 15px; 
            background: white; padding: 20px; border-radius: 10px; 
            z-index: 10; max-width: 350px; border-top: 5px solid #0d6efd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #ui-layer p { font-size: 18px; line-height: 1.6; }
        #ui-layer h3 { font-size: 24px; margin: 0 0 10px 0; }
        #toggle-btn {
            background: #0d6efd; color: white; border: none; padding: 12px;
            width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
        #calc-box { 
            display: none; margin-top: 15px; font-size: 18px; 
            line-height: 1.5; border-top: 1px solid #ddd; padding-top: 10px; 
        }
        .step { display: none; margin-bottom: 10px; border-left: 3px solid #0d6efd; padding-left: 10px; }
        #next-btn { 
            display: none; margin-top: 10px; background: #198754; color: white; 
            border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; 
        }
        #debug-info {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.8); padding: 10px;
            border-radius: 8px; font-family: monospace; font-size: 12px;
            pointer-events: none; border: 1px solid #ccc; z-index: 20;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <h3>2024 DSE Math Paper I Q18</h3>
    <p>PQRS is a quadrilateral where $PQ=12$, $PS=10$, $QR=13$, $\angle QPS=82^\circ$ and $\angle QRS=65^\circ$.</p>
    
    <button id="reset-cam-btn" style="margin-bottom: 10px; background: #fd7e14; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="resetCamera()">Reset Camera 🎥</button>
    
    <button id="toggle-btn" onclick="startSteps()">Show Calculation Steps</button>
    
    <div id="calc-box">
        <div id="step-container"></div>
        <button id="next-btn" onclick="nextStep()">Next Step ➔</button>
    </div>
</div>

<div id="debug-info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // 1. CALCULATION DATA
    const stepData = [
        "1. <b>In ΔPQS, find QS:</b><br>$QS^2 = 12^2 + 10^2 - 2(12)(10)\cos 82^\circ$<br>$QS \approx 14.5126$",
        "2. <b>In ΔQRS, find ∠RSQ:</b><br>$\frac{13}{\sin \angle RSQ} = \frac{QS}{\sin 65^\circ}$<br>$\angle RSQ \approx 54.27^\circ$",
        "3. <b>Find ∠RQS:</b><br>$\angle RQS = 180^\circ - 65^\circ - 54.27^\circ = 60.73^\circ$"
    ];

    // 2. SCENE SETUP
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f2f5);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const matDefault = new THREE.LineBasicMaterial({ color: 0x333333 });
    const matActive  = new THREE.LineBasicMaterial({ color: 0x0d6efd, linewidth: 3 });
    const matTarget  = new THREE.LineBasicMaterial({ color: 0xff0000 });

    // 3. GEOMETRY DEFINITION
    const rad82 = 82 * Math.PI / 180;
    const V = {
        P: new THREE.Vector3(0, 0, 0),
        S: new THREE.Vector3(10, 0, 0),
        Q: new THREE.Vector3(12 * Math.cos(rad82), 12 * Math.sin(rad82), 0),
        R: new THREE.Vector3(18, 5, 0) // Visual approximation for R
    };

    // Labels
    Object.keys(V).forEach(key => makeLabel(key, V[key], "black", true));

    // Lines
    const linePQ = createLine(V.P, V.Q);
    const linePS = createLine(V.P, V.S);
    const lineQR = createLine(V.Q, V.R);
    const lineRS = createLine(V.R, V.S);
    const lineQS = createLine(V.Q, V.S); // Hinge/Diagonal

    const defaultLines = [linePQ, linePS, lineQR, lineRS];
    
    // Meshes (Solved Flashing with polygonOffset)
    const meshPQS = createTriangle(V.P, V.Q, V.S, 0x0d6efd);
    const meshQRS = createTriangle(V.Q, V.R, V.S, 0xffc107);

    // 4. INTERACTIVE LOGIC
    function updateHighlights(step) {
        // Reset
        defaultLines.forEach(l => l.material = matDefault);
        lineQS.visible = false;
        meshPQS.visible = false;
        meshQRS.visible = false;

        if (step === 1) {
            linePQ.material = linePS.material = lineQS.material = matActive;
            lineQS.visible = true;
            meshPQS.visible = true;
        } else if (step === 2 || step === 3) {
            lineQR.material = lineRS.material = lineQS.material = matActive;
            lineQS.visible = true;
            meshQRS.visible = true;
        }
    }

    // 5. HELPER FUNCTIONS
    function createLine(v1, v2, material = matDefault) {
        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([v1, v2]), material);
        scene.add(line);
        return line;
    }

    function createTriangle(p1, p2, p3, color, opacity = 0.3) {
        const geom = new THREE.BufferGeometry().setFromPoints([p1, p2, p3]);
        geom.setIndex([0, 1, 2]);
        const mesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ 
            color, side: THREE.DoubleSide, transparent: true, opacity,
            // SOLUTION FOR FLASHING:
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        }));
        mesh.visible = false;
        scene.add(mesh);
        return mesh;
    }

    function makeLabel(text, pos, color = "black", isLarge = false) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 256;
        ctx.font = isLarge ? 'Bold 100px Arial' : '80px Arial';
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.fillText(text, 128, 128);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), sizeAttenuation: false }));
        sprite.position.copy(pos);
        sprite.scale.set(0.05, 0.05, 1);
        scene.add(sprite);
        return sprite;
    }

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    function resetCamera() {
        camera.position.set(5, 5, 25);
        controls.target.set(8, 4, 0);
        controls.update();
    }
    resetCamera();

    function animate() {
        requestAnimationFrame(animate);
        const cp = camera.position;
        document.getElementById('debug-info').innerHTML = `Cam: ${cp.x.toFixed(1)}, ${cp.y.toFixed(1)}, ${cp.z.toFixed(1)}`;
        renderer.render(scene, camera);
    }
    animate();

    // UI Step Management
    const container = document.getElementById('step-container');
    stepData.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'step'; div.id = 's' + (i + 1); div.innerHTML = text;
        container.appendChild(div);
    });

    let currentStep = 0;
    function startSteps() {
        document.getElementById('calc-box').style.display = 'block';
        document.getElementById('toggle-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
        nextStep();
    }

    function nextStep() {
        currentStep++;
        if (currentStep <= stepData.length) {
            document.getElementById('s' + currentStep).style.display = 'block';
            updateHighlights(currentStep);
        }
        if (currentStep === stepData.length) {
            const btn = document.getElementById('next-btn');
            btn.innerHTML = "Reset ↺"; btn.onclick = () => location.reload();
        }
    }
</script>
</body>
</html>
