<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #0f172a;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 10% Fancy Navigation */
        .top-section {
            height: 10vh;
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 60px;
        }

        .nav-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth; 
            width: 100%;
            height: 100%;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .nav-wrapper::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            flex: 0 0 15%; /* Slightly narrower for a sleeker look */
            height: 60%;
            margin: 0 12px;
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            border: none;
            background: rgba(255, 255, 255, 0.03);
            color: #64748b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* Ultra-smooth cubic-bezier transition */
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        /* Fancy Hover & Glassmorphism */
        .nav-btn:hover {
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-btn.active {
            color: #fff;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.5), 
                        0 8px 10px -6px rgba(37, 99, 235, 0.5);
        }

        /* Underline effect for active */
        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: #fff;
            transition: all 0.4s ease;
            transform: translateX(-50%);
        }

        .nav-btn.active::after {
            width: 40%;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .arrow:hover { 
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .arrow-left { left: 15px; }
        .arrow-right { right: 15px; }

        /* Bottom 90% Content Area */
        .bottom-section {
            height: 90vh;
            overflow-y: auto;
            padding: 40px 20px;
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            /* "Liquid" smooth entry */
            animation: slideUpFade 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .page.active {
            display: block;
        }

        .question-block {
            background: #fff;
            padding: 25px;
            margin-bottom: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .img-placeholder {
            width: 100%;
            background-color: #f1f5f9;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            border-radius: 12px;
            font-weight: 500;
        }

        .text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #1e293b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-section">
        <button class="arrow arrow-left" onclick="scrollNav(-400)">&#10094;</button>
        <div class="nav-wrapper" id="nav-wrapper"></div>
        <button class="arrow arrow-right" onclick="scrollNav(400)">&#10095;</button>
    </div>
    <main class="bottom-section" id="content-area"></main>
</div>

<script>
    const nav = document.getElementById('nav-wrapper');
    const content = document.getElementById('content-area');

    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.id = `btn-${i}`;
        btn.innerText = i;
        btn.onclick = () => goToPage(i);
        nav.appendChild(btn);

        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${i}`;
        
        for (let j = 1; j <= 8; j++) {
            const h = Math.floor(Math.random() * 200) + 200;
            page.innerHTML += `
                <div class="question-block">
                    <div class="img-placeholder" style="height:${h}px">Visual Resource ${i}.${j}</div>
                    <div class="text"><strong>Module ${i}: Item ${j}</strong><br>Experience the ultra-smooth transitions between content sections.</div>
                </div>`;
        }
        content.appendChild(page);
    }

    function goToPage(num) {
        const currentActiveBtn = document.querySelector('.nav-btn.active');
        if (currentActiveBtn && currentActiveBtn.id === `btn-${num}`) return;

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const activeBtn = document.getElementById(`btn-${num}`);
        const activePage = document.getElementById(`page-${num}`);

        activeBtn.classList.add('active');
        activePage.classList.add('active');

        // Smooth centering for Nav
        const offset = activeBtn.offsetLeft - (nav.offsetWidth / 2) + (activeBtn.offsetWidth / 2);
        nav.scrollTo({ left: offset, behavior: 'smooth' });

        // Smooth vertical scroll to top
        content.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollNav(val) {
        nav.scrollBy({ left: val, behavior: 'smooth' });
    }

    // Initialize
    goToPage(1);
</script>

</body>
</html>
