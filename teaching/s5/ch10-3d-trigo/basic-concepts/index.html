<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 1/3: Navigation Section */
        .top-section {
            height: 33.33vh;
            background-color: #f0f0f0;
            border-bottom: 2px solid #ccc;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 10px;
        }

        .nav-btn {
            width: 20%; /* 1/5 of width */
            height: calc(50% - 10px); /* Split into two rows */
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #999;
            background-color: #fff;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background-color: #e0e0e0;
        }

        .nav-btn.active {
            background-color: #007bff;
            color: white;
            border-color: #0056b3;
        }

        /* Bottom 2/3: Content Section */
        .bottom-section {
            height: 66.67vh;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
        }

        .question {
            margin-bottom: 40px;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .question-image {
            width: 100%;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: #666;
            font-style: italic;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <nav class="top-section" id="navbar">
        </nav>

    <main class="bottom-section" id="content-area">
        </main>
</div>

<script>
    const navbar = document.getElementById('navbar');
    const contentArea = document.getElementById('content-area');
    const totalPages = 10;
    const questionsPerPage = 8;

    // Generate Buttons and Pages
    for (let i = 1; i <= totalPages; i++) {
        // Create Navigation Button
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.innerText = i;
        btn.onclick = () => showPage(i);
        navbar.appendChild(btn);

        // Create Page Container
        const page = document.createElement('div');
        page.className = 'page-content';
        page.id = `page-${i}`;
        
        const title = document.createElement('h2');
        title.innerText = `Section ${i}`;
        title.style.marginBottom = '20px';
        page.appendChild(title);

        // Create 8 Questions per page
        for (let j = 1; j <= questionsPerPage; j++) {
            const qBox = document.createElement('div');
            qBox.className = 'question';
            
            // Randomized height for placeholder images to demonstrate scrolling
            const randomHeight = Math.floor(Math.random() * (400 - 150 + 1)) + 150;
            
            qBox.innerHTML = `
                <div class="question-image" style="height: ${randomHeight}px;">
                    [Image for Question ${j} - Height: ${randomHeight}px]
                </div>
                <div class="question-text">
                    <strong>Question ${i}.${j}:</strong> This is a sample question that requires the user to scroll if the content exceeds the viewport height.
                </div>
                <textarea style="width:100%; height:60px;" placeholder="Enter answer..."></textarea>
            `;
            page.appendChild(qBox);
        }
        contentArea.appendChild(page);
    }

    function showPage(pageNum) {
        // Update Buttons
        document.querySelectorAll('.nav-btn').forEach((btn, index) => {
            btn.classList.toggle('active', (index + 1) === pageNum);
        });

        // Update Content
        document.querySelectorAll('.page-content').forEach(page => {
            page.classList.remove('active');
        });
        document.getElementById(`page-${pageNum}`).classList.add('active');

        // Reset scroll position to top when changing pages
        contentArea.scrollTop = 0;
    }

    // Initialize Page 1
    showPage(1);
</script>

</body>
</html>
