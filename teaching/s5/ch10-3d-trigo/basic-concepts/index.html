<!DOCTYPE html>
<!-- https://ycshea.github.io/MyMath/teaching/s5/ch10-3d-trigo/basic-concepts/index.html -->
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Math Quiz Dashboard</title>
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            
            body, html {
                height: 100%;
                font-family: 'Segoe UI', Roboto, sans-serif;
                overflow: hidden;
                background-color: #0f172a;
            }
    
            .container {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
    
            /* --- Navigation --- */
            .top-section {
                height: 10vh;
                background: #0f172a;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                display: flex;
                align-items: center;
                position: relative;
                padding: 0 70px;
            }
    
            .nav-wrapper {
                display: flex;
                overflow-x: auto;
                scroll-behavior: smooth;
                width: 100%;
                height: 100%;
                align-items: center;
                scrollbar-width: none;
            }
    
            .nav-wrapper::-webkit-scrollbar { display: none; }
    
            .nav-btn {
                flex: 0 0 20%;
                height: 80%;
                font-size: 3.5rem;
                font-weight: 900;
                cursor: pointer;
                border: none;
                background: transparent;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: transparent;
                -webkit-text-stroke: 1px rgba(255,255,255,0.4);
                transition: all 0.4s;
                position: relative;
            }
    
            .nav-btn.active {
                -webkit-text-stroke: 1.5px #60a5fa;
                transform: scale(1.1);
                background-color: rgba(96,165,250,0.15);
                border-radius: 12px;
            }
    
            .nav-dots {
                display: flex;
                gap: 3px;
                position: absolute;
                bottom: 6px;
            }
    
            .nav-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: rgba(255,255,255,0.2);
            }
    
            .nav-dot.correct { background: #34d399; }
            .nav-dot.wrong { background: #f87171; }
    
            .arrow {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                width: 40px;
                height: 40px;
                background: rgba(255,255,255,0.1);
                color: #fff;
                border: 1px solid rgba(255,255,255,0.2);
                border-radius: 50%;
                cursor: pointer;
                z-index: 10;
            }
    
            .arrow-left { left: 12px; }
            .arrow-right { right: 12px; }
    
            .progress-bar-wrap {
                height: 4px;
                background: rgba(255,255,255,0.08);
            }
    
            .progress-bar-fill {
                height: 100%;
                background: linear-gradient(90deg, #34d399, #60a5fa);
                transition: width 0.5s;
                width: 0%;
            }
    
            /* --- Content Area --- */
            .bottom-section {
                flex: 1;
                overflow-y: auto;
                padding: 32px 20px 60px;
                background-color: #f8fafc;
            }
    
            .page {
                display: none;
                max-width: 760px;
                margin: 0 auto;
                animation: slideUp 0.5s ease;
            }
    
            .page.active { display: block; }
    
            @keyframes slideUp {
                from { opacity: 0; transform: translateY(12px); }
                to { opacity: 1; transform: translateY(0); }
            }
    
            .question-block {
                background: #fff;
                padding: 24px;
                margin-bottom: 20px;
                border-radius: 16px;
                border: 1.5px solid #e2e8f0;
            }
    
            .question-block.all-correct { border-color: #6ee7b7; }
            .question-block.has-wrong { border-color: #fca5a5; }
    
            .options-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
    
            .option-wrap input { display: none; }
    
            .option-label {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px;
                border: 1.5px solid #e2e8f0;
                border-radius: 10px;
                cursor: pointer;
                background: #f8fafc;
                transition: 0.2s;
            }
    
            .option-letter {
                width: 26px;
                height: 26px;
                border-radius: 50%;
                background: #e2e8f0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
            }
    
            /* Logic States */
            .correct-ans { border-color: #6ee7b7; background: #f0fdf4; }
            .correct-ans .option-letter { background: #10b981; color: #fff; }
            .wrong-ans { border-color: #fca5a5; background: #fff1f2; }
            .wrong-ans .option-letter { background: #ef4444; color: #fff; }
            .revealed-correct { border-color: #6ee7b7; background: #f0fdf4; }
            .revealed-correct .option-letter { background: #10b981; color: #fff; }
            .locked { pointer-events: none; }
    
            .question-result {
                display: none;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                align-items: center;
                justify-content: center;
                font-weight: bold;
            }
    
            .question-result.show { display: flex; }
            .tick { background: #d1fae5; color: #065f46; }
            .cross { background: #fee2e2; color: #991b1b; }
    
            .hint-line {
                display: none;
                margin-top: 12px;
                padding: 8px;
                background: #f0fdf4;
                border-left: 3px solid #10b981;
                border-radius: 4px;
            }
    
            .hint-line.show { display: block; }
    
            /* Summary */
            .summary-section {
                display: none;
                max-width: 760px;
                margin: 0 auto;
                text-align: center;
            }
    
            .summary-section.active { display: block; }
    
            .summary-card {
                background: #fff;
                border-radius: 16px;
                padding: 32px;
                border: 1.5px solid #e2e8f0;
                margin-bottom: 20px;
            }
    
            .summary-big { font-size: 4rem; font-weight: 900; }
    
            .bottom-bar {
                max-width: 760px;
                margin: 20px auto;
                display: flex;
                justify-content: flex-end;
                gap: 10px;
            }
    
            .btn {
                padding: 12px 24px;
                border-radius: 50px;
                border: none;
                font-weight: bold;
                cursor: pointer;
                transition: 0.2s;
            }
    
            .btn-success { background: #10b981; color: #fff; }
            .btn-success:hover { background: #059669; }
        </style>
    </head>
    <body>    
        <div class="container">
            <div class="top-section">
                <button class="arrow arrow-left" onclick="scrollNav(-400)">&#8249;</button>
                <div class="nav-wrapper" id="nav-wrapper"></div>
                <button class="arrow arrow-right" onclick="scrollNav(400)">&#8250;</button>
            </div>
            
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        
            <main class="bottom-section" id="scroll-container">
                <div id="content-area"></div>
        
                <div class="summary-section" id="summary-section">
                    <div class="summary-card">
                        <div class="summary-big" id="summary-score">0</div>
                        <p>Correct Answers</p>
                    </div>
                </div>
        
                <div class="bottom-bar" id="submit-bar">
                    <button class="btn btn-success" onclick="submitQuiz()">Submit Quiz</button>
                </div>
            </main>
        </div>
    
        <script>
            const SESSIONS = 10;
            const QPP = 3;
        
            const quizData = [
                { id: "q_1_1", question: "What is 3² + 4²?", options: { A: "25", B: "12", C: "7", D: "49" }, answer: "A", file: "q1_1.png" },
                { id: "q_1_2", question: "Simplify: 2x + 3x - x", options: { A: "5x", B: "4x", C: "6x", D: "x" }, answer: "B", file: "" },
                { id: "q_1_3", question: "What is the slope of y = 3x + 7?", options: { A: "7", B: "1/3", C: "3", D: "-3" }, answer: "C", file: "q1_3.png" },
                { id: "q_2_1", question: "Solve 2x - 4 = 0", options: { A: "1", B: "2", C: "4", D: "0" }, answer: "B", file: "" },
                { id: "q_2_2", question: "What is sin(90°)?", options: { A: "0", B: "0.5", C: "0.8", D: "1" }, answer: "D", file: "" },
                { id: "q_2_3", question: "Expand (x+2)²", options: { A: "x²+4x+4", B: "x²+4", C: "x²+2x+4", D: "2x+4" }, answer: "A", file: "" },
                { id: "q_3_1", question: "Area of circle with radius 3?", options: { A: "3π", B: "6π", C: "9π", D: "12π" }, answer: "C", file: "" },
                { id: "q_3_2", question: "Solve x² = 16", options: { A: "4", B: "±4", C: "8", D: "2" }, answer: "B", file: "" },
                { id: "q_3_3", question: "Value of log₁₀(1000)?", options: { A: "1", B: "2", C: "3", D: "10" }, answer: "C", file: "" },
                { id: "q_4_1", question: "Derivative of x³?", options: { A: "3x²", B: "x²", C: "3x", D: "x³" }, answer: "A", file: "" },
                { id: "q_4_2", question: "Factor of x² - 9?", options: { A: "x-1", B: "x-9", C: "x-3", D: "x+9" }, answer: "C", file: "" },
                { id: "q_4_3", question: "Value of 0!?", options: { A: "0", B: "1", C: "undefined", D: "10" }, answer: "B", file: "" },
                { id: "q_5_1", question: "What is cos(0°)?", options: { A: "0", B: "0.5", C: "-1", D: "1" }, answer: "D", file: "" },
                { id: "q_5_2", question: "If f(x)=2x+1, f(3)=?", options: { A: "7", B: "6", C: "5", D: "8" }, answer: "A", file: "" },
                { id: "q_5_3", question: "Perimeter of square side 5?", options: { A: "10", B: "15", C: "20", D: "25" }, answer: "C", file: "" },
                { id: "q_6_1", question: "Sum of angles in triangle?", options: { A: "90°", B: "180°", C: "270°", D: "360°" }, answer: "B", file: "" },
                { id: "q_6_2", question: "What is √144?", options: { A: "11", B: "12", C: "14", D: "16" }, answer: "B", file: "" },
                { id: "q_6_3", question: "Simplify (x²)³?", options: { A: "x⁵", B: "2x³", C: "x⁶", D: "x²³" }, answer: "C", file: "" },
                { id: "q_7_1", question: "y-intercept of y=4x-3?", options: { A: "-3", B: "4", C: "0", D: "3" }, answer: "A", file: "" },
                { id: "q_7_2", question: "What is 2³ * 2²?", options: { A: "2⁶", B: "4⁵", C: "2¹", D: "2⁵" }, answer: "D", file: "" },
                { id: "q_7_3", question: "Quadratic formula roots?", options: { A: "Roots", B: "Area", C: "Slope", D: "Volume" }, answer: "A", file: "" },
                { id: "q_8_1", question: "Reciprocal of 1/2?", options: { A: "1", B: "0.5", C: "2", D: "-2" }, answer: "C", file: "" },
                { id: "q_8_2", question: "Mean of 2, 4, 6, 8?", options: { A: "4", B: "5", C: "6", D: "20" }, answer: "B", file: "" },
                { id: "q_8_3", question: "What is tan(45°)?", options: { A: "0", B: "0.5", C: "1", D: "√3" }, answer: "C", file: "" },
                { id: "q_9_1", question: "HCF of 12 and 18?", options: { A: "2", B: "3", C: "4", D: "6" }, answer: "D", file: "" },
                { id: "q_9_2", question: "Solve 3(x-2)=9", options: { A: "5", B: "3", C: "6", D: "1" }, answer: "A", file: "" },
                { id: "q_9_3", question: "Volume of cube side 3?", options: { A: "9", B: "12", C: "27", D: "18" }, answer: "C", file: "" },
                { id: "q_10_1", question: "Sum of angles in pentagon?", options: { A: "540°", B: "360°", C: "180°", D: "720°" }, answer: "A", file: "" },
                { id: "q_10_2", question: "Which is a²+b²=c²?", options: { A: "Sine Rule", B: "Pythagoras", C: "Leibniz", D: "Cosine" }, answer: "B", file: "" },
                { id: "q_10_3", question: "What is ∫x dx?", options: { A: "x²", B: "1", C: "x", D: "x²/2 + C" }, answer: "D", file: "" }
            ];
        
            let userAnswers = JSON.parse(localStorage.getItem('quiz_answers_v2')) || {};
            let submitted = JSON.parse(localStorage.getItem('quiz_submitted')) || false;
        
            function buildUI() {
                const nav = document.getElementById('nav-wrapper');
                const content = document.getElementById('content-area');
        
                for (let i = 1; i <= SESSIONS; i++) {
                    // Navigation Button
                    const btn = document.createElement('button');
                    btn.className = 'nav-btn';
                    btn.id = `btn-${i}`;
                    btn.onclick = () => goToPage(i);
                    btn.innerHTML = `${i}<div class="nav-dots">${Array(QPP).fill('<div class="nav-dot"></div>').join('')}</div>`;
                    nav.appendChild(btn);
        
                    // Page Container
                    const page = document.createElement('div');
                    page.className = 'page';
                    page.id = `page-${i}`;
                    page.innerHTML = `<div style="margin-bottom:20px; font-weight:bold; color:#1e293b;">Session ${i}</div>`;
        
                    const sessionQs = quizData.filter(q => q.id.startsWith(`q_${i}_`));
                    sessionQs.forEach((q, idx) => {
                        const imgHtml = q.file ? `<img src="${q.file}" style="max-width:100%; margin:10px 0; border-radius:8px;" onerror="this.style.display='none'">` : '';
                        
                        page.innerHTML += `
                            <div class="question-block" id="block-${q.id}">
                                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                    <p style="font-weight:600; color:#1e293b;">Q${idx+1}. ${q.question}</p>
                                    <div class="question-result" id="result-${q.id}"></div>
                                </div>
                                ${imgHtml}
                                <div class="options-grid">
                                    ${['A','B','C','D'].map(opt => `
                                        <label class="option-wrap">
                                            <input type="radio" name="${q.id}" value="${opt}" onchange="selectAnswer('${q.id}','${opt}')" ${userAnswers[q.id] === opt ? 'checked' : ''}>
                                            <div class="option-label" id="label-${q.id}-${opt}">
                                                <div class="option-letter">${opt}</div>
                                                <span>${q.options[opt]}</span>
                                            </div>
                                        </label>
                                    `).join('')}
                                </div>
                                <div class="hint-line" id="hint-${q.id}">Correct answer: ${q.answer}</div>
                            </div>`;
                    });
                    content.appendChild(page);
                }
            }
        
            function selectAnswer(qId, val) {
                if (submitted) return;
                userAnswers[qId] = val;
                localStorage.setItem('quiz_answers_v2', JSON.stringify(userAnswers));
                updateProgress();
            }
        
            function applyAnswerUI(qId, val) {
                const data = quizData.find(q => q.id === qId);
                if(!data) return;
                const isRight = val === data.answer;
                
                ['A','B','C','D'].forEach(opt => {
                    const lbl = document.getElementById(`label-${qId}-${opt}`);
                    if(lbl) {
                        lbl.className = 'option-label locked';
                        if (opt === val) lbl.classList.add(isRight ? 'correct-ans' : 'wrong-ans');
                        if (!isRight && opt === data.answer) lbl.classList.add('revealed-correct');
                    }
                });
        
                const res = document.getElementById(`result-${qId}`);
                if(res) {
                    res.className = `question-result show ${isRight ? 'tick' : 'cross'}`;
                    res.innerText = isRight ? '✓' : '✗';
                }
                
                const hint = document.getElementById(`hint-${qId}`);
                if(!isRight && hint) hint.classList.add('show');
                
                const [_, sNum, qNum] = qId.split('_');
                const dots = document.getElementById(`btn-${sNum}`).querySelectorAll('.nav-dot');
                if(dots[qNum-1]) dots[qNum-1].className = `nav-dot ${isRight ? 'correct' : 'wrong'}`;
            }
        
            function updateProgress() {
                const total = SESSIONS * QPP;
                const answered = Object.keys(userAnswers).length;
                document.getElementById('progress-bar').style.width = (answered / total * 100) + '%';
            }
        
            function submitQuiz() {
                submitted = true;
                localStorage.setItem('quiz_submitted', 'true');
                
                // Trigger feedback for ALL questions
                quizData.forEach(q => {
                    applyAnswerUI(q.id, userAnswers[q.id] || "");
                });

                const score = quizData.reduce((acc, q) => acc + (userAnswers[q.id] === q.answer ? 1 : 0), 0);
                document.getElementById('summary-score').innerText = score;
                document.getElementById('submit-bar').style.display = 'none';
                document.getElementById('summary-section').classList.add('active');
            }
        
            function goToPage(n) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                const targetPage = document.getElementById('page-'+n);
                const targetBtn = document.getElementById('btn-'+n);
                if(targetPage) targetPage.classList.add('active');
                if(targetBtn) targetBtn.classList.add('active');
            }
        
            function scrollNav(x) { 
                document.getElementById('nav-wrapper').scrollBy({left: x, behavior: 'smooth'}); 
            }
        
            // Initialize
            buildUI();
            goToPage(1);
        
            // Restore State
            updateProgress();
            if (submitted) {
                submitQuiz();
            }
        
        </script>
    </body>
</html>
