<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #0f172a;
        }

        .container { display: flex; flex-direction: column; height: 100vh; }

        /* ── Top nav ── */
        .top-section {
            height: 10vh;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 70px;
        }

        .nav-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            width: 100%;
            height: 100%;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .nav-wrapper::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex: 0 0 20%;
            height: 80%;
            font-size: 3.5rem;
            font-weight: 900;
            cursor: pointer;
            border: none;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.4);
            transition: all 0.4s cubic-bezier(0.2,1,0.3,1);
            border-radius: 12px;
            position: relative;
        }

        .nav-btn.active {
            -webkit-text-stroke: 1.5px #60a5fa;
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(96,165,250,0.5));
            background-color: rgba(96,165,250,0.15);
        }

        /* small dot-row under each nav number */
        .nav-dots {
            display: flex;
            gap: 3px;
            position: absolute;
            bottom: 6px;
        }
        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.3s;
        }
        .nav-dot.correct  { background: #34d399; }
        .nav-dot.wrong    { background: #f87171; }
        .nav-dot.answered { background: rgba(255,255,255,0.5); }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arrow-left  { left: 12px; }
        .arrow-right { right: 12px; }

        /* ── Progress bar ── */
        .progress-bar-wrap {
            height: 4px;
            background: rgba(255,255,255,0.08);
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #34d399, #60a5fa);
            transition: width 0.5s ease;
            width: 0%;
        }

        /* ── Bottom content ── */
        .bottom-section {
            flex: 1;
            overflow-y: auto;
            padding: 32px 20px 60px;
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            max-width: 760px;
            margin: 0 auto;
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Session header ── */
        .session-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .session-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
        }
        .session-badge {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 50px;
            background: #e2e8f0;
            color: #64748b;
            transition: background 0.4s, color 0.4s;
        }
        .session-badge.perfect { background: #d1fae5; color: #065f46; }
        .session-badge.partial { background: #fef3c7; color: #92400e; }
        .session-badge.wrong   { background: #fee2e2; color: #991b1b; }

        /* ── Question card ── */
        .question-block {
            background: #fff;
            padding: 24px;
            margin-bottom: 20px;
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            transition: border-color 0.3s;
        }
        .question-block.all-correct { border-color: #6ee7b7; }
        .question-block.has-wrong   { border-color: #fca5a5; }

        .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* radio hidden, label is the whole button */
        .option-wrap input[type="radio"] { display: none; }

        .option-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #334155;
            background: #f8fafc;
            transition: all 0.2s;
            user-select: none;
        }
        .option-label:hover { background: #f1f5f9; border-color: #94a3b8; }

        .option-letter {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #64748b;
            font-weight: 700;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        /* States after answering */
        .option-label.selected {
            border-color: #93c5fd;
            background: #eff6ff;
        }
        .option-label.selected .option-letter {
            background: #3b82f6;
            color: #fff;
        }

        .option-label.correct-ans {
            border-color: #6ee7b7;
            background: #f0fdf4;
            cursor: default;
        }
        .option-label.correct-ans .option-letter {
            background: #10b981;
            color: #fff;
        }

        .option-label.wrong-ans {
            border-color: #fca5a5;
            background: #fff1f2;
            cursor: default;
        }
        .option-label.wrong-ans .option-letter {
            background: #ef4444;
            color: #fff;
        }

        .option-label.revealed-correct {
            border-color: #6ee7b7;
            background: #f0fdf4;
            cursor: default;
        }
        .option-label.revealed-correct .option-letter {
            background: #10b981;
            color: #fff;
        }

        /* locked after answer */
        .option-label.locked { cursor: default; pointer-events: none; }

        /* result icon at right of question */
        .question-result {
            display: none;
            margin-left: auto;
            width: 28px; height: 28px;
            border-radius: 50%;
            font-size: 0.9rem;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .question-result.show { display: flex; }
        .question-result.tick {
            background: #d1fae5;
            color: #065f46;
        }
        .question-result.cross {
            background: #fee2e2;
            color: #991b1b;
        }

        /* hint line shown after wrong answer */
        .hint-line {
            display: none;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #065f46;
            background: #f0fdf4;
            border-left: 3px solid #10b981;
            padding: 8px 12px;
            border-radius: 0 8px 8px 0;
        }
        .hint-line.show { display: block; }

        /* ── Summary section ── */
        .summary-section {
            display: none;
            max-width: 760px;
            margin: 0 auto;
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .summary-section.active { display: block; }

        .summary-card {
            background: #fff;
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
        }
        .summary-big {
            font-size: 4rem;
            font-weight: 900;
            color: #1e293b;
            line-height: 1;
        }
        .summary-sub {
            font-size: 1rem;
            color: #64748b;
            margin-top: 6px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 24px;
        }
        .summary-stat {
            background: #f8fafc;
            border-radius: 10px;
            padding: 14px;
            border: 1px solid #e2e8f0;
        }
        .summary-stat-num {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
        }
        .summary-stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 2px;
        }
        .session-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }
        .session-row:last-child { border-bottom: none; }
        .session-row-dots {
            display: flex;
            gap: 5px;
        }
        .session-row-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }
        .session-row-dot.correct { background: #10b981; }
        .session-row-dot.wrong   { background: #ef4444; }
        .session-row-dot.empty   { background: #e2e8f0; }

        /* ── Submit / review buttons ── */
        .bottom-bar {
            max-width: 760px;
            margin: 24px auto 0;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover { transform: scale(1.03); }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-success:hover { background: #059669; }
        .btn-ghost {
            background: #f1f5f9;
            color: #475569;
        }
        .btn-ghost:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-section">
        <button class="arrow arrow-left" onclick="scrollNav(-400)">&#8249;</button>
        <div class="nav-wrapper" id="nav-wrapper"></div>
        <button class="arrow arrow-right" onclick="scrollNav(400)">&#8250;</button>
    </div>
    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <main class="bottom-section" id="scroll-container">
        <div id="content-area"></div>

        <!-- Summary page (hidden until submitted) -->
        <div class="summary-section" id="summary-section">
            <div class="summary-card">
                <div class="summary-big" id="summary-score">0</div>
                <div class="summary-sub" id="summary-sub">out of 30 questions correct</div>
                <div class="summary-grid">
                    <div class="summary-stat">
                        <div class="summary-stat-num" id="stat-correct" style="color:#10b981">0</div>
                        <div class="summary-stat-label">Correct</div>
                    </div>
                    <div class="summary-stat">
                        <div class="summary-stat-num" id="stat-wrong" style="color:#ef4444">0</div>
                        <div class="summary-stat-label">Wrong</div>
                    </div>
                    <div class="summary-stat">
                        <div class="summary-stat-num" id="stat-skipped" style="color:#f59e0b">0</div>
                        <div class="summary-stat-label">Skipped</div>
                    </div>
                </div>
            </div>
            <div style="background:#fff; border-radius:16px; border:1.5px solid #e2e8f0; padding:24px;">
                <div style="font-weight:700; font-size:1rem; color:#1e293b; margin-bottom:12px;">Session breakdown</div>
                <div id="session-breakdown"></div>
            </div>
            <div class="bottom-bar">
                <button class="btn btn-ghost" onclick="resetQuiz()">Restart quiz</button>
                <button class="btn btn-primary" onclick="reviewMode()">Review answers</button>
            </div>
        </div>

        <div class="bottom-bar" id="submit-bar">
            <button class="btn btn-success" onclick="submitQuiz()">Submit quiz</button>
        </div>
    </main>
</div>

<script>
const SESSIONS = 10;
const QPP = 3; // questions per session

// ── Answer key ──
const answerKey = {
    q_1_1:"A", q_1_2:"B", q_1_3:"C",
    q_2_1:"B", q_2_2:"D", q_2_3:"A",
    q_3_1:"C", q_3_2:"B", q_3_3:"D",
    q_4_1:"A", q_4_2:"C", q_4_3:"B",
    q_5_1:"D", q_5_2:"A", q_5_3:"C",
    q_6_1:"B", q_6_2:"B", q_6_3:"D",
    q_7_1:"A", q_7_2:"D", q_7_3:"A",
    q_8_1:"C", q_8_2:"B", q_8_3:"C",
    q_9_1:"D", q_9_2:"A", q_9_3:"B",
    q_10_1:"A", q_10_2:"C", q_10_3:"D",
};

// Question texts (placeholder — replace with real math questions)
const questionTexts = {
    q_1_1: "What is 3² + 4²?",
    q_1_2: "Simplify: 2x + 3x − x",
    q_1_3: "What is the slope of y = 3x + 7?",
    q_2_1: "Which value satisfies 2x − 4 = 0?",
    q_2_2: "What is sin(90°)?",
    q_2_3: "Expand: (x + 2)²",
    q_3_1: "What is the area of a circle with radius 3?",
    q_3_2: "Solve: x² = 16",
    q_3_3: "What is log₁₀(1000)?",
    q_4_1: "What is the derivative of x³?",
    q_4_2: "Which is a factor of x² − 9?",
    q_4_3: "What is 0!?",
    q_5_1: "What is cos(0°)?",
    q_5_2: "If f(x) = 2x + 1, what is f(3)?",
    q_5_3: "What is the perimeter of a square with side 5?",
    q_6_1: "How many degrees in a triangle?",
    q_6_2: "What is √144?",
    q_6_3: "Simplify: (x²)³",
    q_7_1: "What is the y-intercept of y = 4x − 3?",
    q_7_2: "What is 2³ × 2²?",
    q_7_3: "Which is the quadratic formula?",
    q_8_1: "What is the reciprocal of ½?",
    q_8_2: "What is the mean of 2, 4, 6, 8?",
    q_8_3: "What is tan(45°)?",
    q_9_1: "What is the HCF of 12 and 18?",
    q_9_2: "Solve: 3(x − 2) = 9",
    q_9_3: "What is the volume of a cube with side 3?",
    q_10_1: "What is the sum of interior angles of a pentagon?",
    q_10_2: "Which rule states a² + b² = c²?",
    q_10_3: "What is ∫x dx?",
};

const optionTexts = {
    A: "Option A", B: "Option B", C: "Option C", D: "Option D"
};

let userAnswers = JSON.parse(localStorage.getItem('quiz_answers_v2')) || {};
let submitted   = JSON.parse(localStorage.getItem('quiz_submitted'))   || false;

const nav     = document.getElementById('nav-wrapper');
const content = document.getElementById('content-area');

// ── Build UI ──
for (let i = 1; i <= SESSIONS; i++) {
    // Nav button
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.id = `btn-${i}`;
    btn.onclick = () => goToPage(i);
    let dotsHtml = '<div class="nav-dots">';
    for (let j = 1; j <= QPP; j++) dotsHtml += `<div class="nav-dot" id="dot-${i}-${j}"></div>`;
    dotsHtml += '</div>';
    btn.innerHTML = `${i}${dotsHtml}`;
    nav.appendChild(btn);

    // Page
    const page = document.createElement('div');
    page.className = 'page';
    page.id = `page-${i}`;

    page.innerHTML = `
        <div class="session-header">
            <div class="session-title">Session ${i}</div>
            <div class="session-badge" id="badge-${i}">0 / ${QPP}</div>
        </div>`;

    for (let j = 1; j <= QPP; j++) {
        const qId = `q_${i}_${j}`;
        const opts = ['A','B','C','D'].map(opt => `
            <label class="option-wrap" id="wrap-${qId}-${opt}">
                <input type="radio" name="${qId}" value="${opt}"
                    onchange="selectAnswer('${qId}','${opt}')">
                <div class="option-label" id="label-${qId}-${opt}">
                    <div class="option-letter">${opt}</div>
                    <span>${opt}: ${optionTexts[opt]}</span>
                </div>
            </label>`).join('');

        page.innerHTML += `
            <div class="question-block" id="block-${qId}">
                <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:16px;">
                    <div class="question-text" style="flex:1">Q${j}. ${questionTexts[qId] || 'Question ' + i + '.' + j}</div>
                    <div class="question-result" id="result-${qId}"></div>
                </div>
                <div class="options-grid">${opts}</div>
                <div class="hint-line" id="hint-${qId}">
                    ✓ Correct answer: <strong>${answerKey[qId]}</strong>
                </div>
            </div>`;
    }
    content.appendChild(page);
}

// ── Restore state on load ──
function restoreState() {
    for (const qId in userAnswers) {
        applyAnswerUI(qId, userAnswers[qId], submitted);
    }
    for (let i = 1; i <= SESSIONS; i++) updateSessionUI(i);
    updateProgress();
    if (submitted) enterSubmittedMode();
}

// ── Select answer ──
function selectAnswer(qId, val) {
    if (submitted) return;
    userAnswers[qId] = val;
    localStorage.setItem('quiz_answers_v2', JSON.stringify(userAnswers));
    applyAnswerUI(qId, val, false);
    const parts = qId.split('_');
    updateSessionUI(parseInt(parts[1]));
    updateProgress();
}

function applyAnswerUI(qId, val, showCorrect) {
    const correct = answerKey[qId];
    const isRight = val === correct;
    const block   = document.getElementById(`block-${qId}`);
    const result  = document.getElementById(`result-${qId}`);
    const hint    = document.getElementById(`hint-${qId}`);

    ['A','B','C','D'].forEach(opt => {
        const lbl = document.getElementById(`label-${qId}-${opt}`);
        if (!lbl) return;
        lbl.className = 'option-label locked';
        if (opt === val) {
            lbl.classList.add(isRight ? 'correct-ans' : 'wrong-ans');
        }
        if (!isRight && opt === correct && (showCorrect || true)) {
            // Always reveal correct answer immediately
            lbl.classList.add('revealed-correct');
        }
    });

    // Result icon
    result.className = `question-result show ${isRight ? 'tick' : 'cross'}`;
    result.textContent = isRight ? '✓' : '✗';

    // Hint
    if (!isRight) hint.classList.add('show');

    // Block border
    if (block) block.classList.add(isRight ? 'all-correct' : 'has-wrong');
}

function updateSessionUI(i) {
    let correct = 0, answered = 0;
    for (let j = 1; j <= QPP; j++) {
        const qId = `q_${i}_${j}`;
        const dot = document.getElementById(`dot-${i}-${j}`);
        if (userAnswers[qId] !== undefined) {
            answered++;
            const isRight = userAnswers[qId] === answerKey[qId];
            if (isRight) correct++;
            if (dot) dot.className = `nav-dot ${isRight ? 'correct' : 'wrong'}`;
        } else {
            if (dot) dot.className = 'nav-dot';
        }
    }

    const badge = document.getElementById(`badge-${i}`);
    if (!badge) return;
    if (answered === 0) {
        badge.textContent = `0 / ${QPP}`;
        badge.className = 'session-badge';
    } else if (correct === QPP) {
        badge.textContent = `${correct} / ${QPP} ✓`;
        badge.className = 'session-badge perfect';
    } else if (correct > 0) {
        badge.textContent = `${correct} / ${QPP}`;
        badge.className = 'session-badge partial';
    } else {
        badge.textContent = `${correct} / ${QPP}`;
        badge.className = 'session-badge wrong';
    }
}

function updateProgress() {
    const total    = SESSIONS * QPP;
    const answered = Object.keys(userAnswers).length;
    document.getElementById('progress-bar').style.width = `${(answered / total) * 100}%`;
}

// ── Submit ──
function submitQuiz() {
    submitted = true;
    localStorage.setItem('quiz_submitted', 'true');
    enterSubmittedMode();
}

function enterSubmittedMode() {
    document.getElementById('submit-bar').style.display = 'none';
    document.getElementById('summary-section').classList.add('active');

    let correct = 0, wrong = 0, skipped = 0;
    for (let i = 1; i <= SESSIONS; i++) {
        for (let j = 1; j <= QPP; j++) {
            const qId = `q_${i}_${j}`;
            if (!userAnswers[qId]) skipped++;
            else if (userAnswers[qId] === answerKey[qId]) correct++;
            else wrong++;
        }
    }

    const total = SESSIONS * QPP;
    document.getElementById('summary-score').textContent = correct;
    document.getElementById('summary-sub').textContent   = `out of ${total} questions correct`;
    document.getElementById('stat-correct').textContent  = correct;
    document.getElementById('stat-wrong').textContent    = wrong;
    document.getElementById('stat-skipped').textContent  = skipped;

    // Session breakdown
    const breakdown = document.getElementById('session-breakdown');
    breakdown.innerHTML = '';
    for (let i = 1; i <= SESSIONS; i++) {
        let sc = 0;
        let dotsHtml = '<div class="session-row-dots">';
        for (let j = 1; j <= QPP; j++) {
            const qId = `q_${i}_${j}`;
            const ans = userAnswers[qId];
            let cls = 'empty';
            if (ans) { cls = ans === answerKey[qId] ? 'correct' : 'wrong'; if (cls === 'correct') sc++; }
            dotsHtml += `<div class="session-row-dot ${cls}"></div>`;
        }
        dotsHtml += '</div>';
        breakdown.innerHTML += `
            <div class="session-row">
                <span style="color:#1e293b;font-weight:600;">Session ${i}</span>
                ${dotsHtml}
                <span style="color:${sc===QPP?'#10b981':sc===0?'#ef4444':'#f59e0b'};font-weight:700;">${sc}/${QPP}</span>
            </div>`;
    }

    goToSummary();
}

function goToSummary() {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('scroll-container').scrollTo({ top: 0, behavior: 'smooth' });
}

function reviewMode() {
    document.getElementById('summary-section').classList.remove('active');
    document.getElementById('submit-bar').style.display = 'none';
    goToPage(1);
}

function resetQuiz() {
    localStorage.removeItem('quiz_answers_v2');
    localStorage.removeItem('quiz_submitted');
    location.reload();
}

// ── Navigation ──
function goToPage(num) {
    document.getElementById('summary-section').classList.remove('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

    const activeBtn  = document.getElementById(`btn-${num}`);
    const activePage = document.getElementById(`page-${num}`);
    activeBtn.classList.add('active');
    activePage.classList.add('active');

    nav.scrollTo({
        left: activeBtn.offsetLeft - (nav.offsetWidth/2) + (activeBtn.offsetWidth/2),
        behavior: 'smooth'
    });
    document.getElementById('scroll-container').scrollTo({ top: 0, behavior: 'smooth' });
}

function scrollNav(val) {
    nav.scrollBy({ left: val, behavior: 'smooth' });
}

nav.addEventListener('wheel', e => { e.preventDefault(); nav.scrollLeft += e.deltaY; });

restoreState();
goToPage(1);
</script>
</body>
