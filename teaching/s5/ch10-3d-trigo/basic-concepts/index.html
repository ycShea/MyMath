<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #0f172a;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 10% Navigation */
        .top-section {
            height: 10vh;
            background: #0f172a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 70px;
        }

        .nav-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth; 
            width: 100%;
            height: 100%;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .nav-wrapper::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex: 0 0 20%;
            height: 80%;
            margin: 0 5px;
            font-size: 3rem;
            font-weight: 900;
            cursor: pointer;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.6);
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* 1/ Highlighted with Background when active */
        .nav-btn.active {
            color: #fff; /* Fill the number with white */
            background-color: #3b82f6; /* Blue background */
            -webkit-text-stroke: 0px; /* Remove outline */
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: #f1f5f9; 
            color: #0f172a; 
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .arrow-left { left: 12px; }
        .arrow-right { right: 12px; }

        /* Bottom 90% Content */
        .bottom-section {
            height: 90vh;
            overflow-y: auto;
            padding: 40px 20px;
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            animation: slideUp 0.6s ease-out;
        }

        .page.active { display: block; }

        .question-block {
            background: #fff;
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        /* 2/ Grid Layout for MC Options (A B / C D) */
        .options-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns */
            gap: 15px;
        }

        .option-label {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            text-align: center;
            font-weight: 500;
            color: #475569;
        }

        .option-label:hover { background-color: #f1f5f9; }

        input[type="radio"] { display: none; }

        input[type="radio"]:checked + .option-label {
            border-color: #3b82f6;
            background-color: #eff6ff;
            color: #1d4ed8;
        }

        /* 3/ Submit Button Styles */
        .submit-container {
            text-align: center;
            padding: 40px 0;
        }

        .submit-btn {
            background-color: #10b981;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .submit-btn:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .score-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
            display: none; /* Hidden until first submit */
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="final-score-box" class="score-display">Your Score: <span id="score-val">0</span></div>

<div class="container">
    <div class="top-section">
        <button class="arrow arrow-left" onclick="scrollNav(-400)">&#8249;</button>
        <div class="nav-wrapper" id="nav-wrapper"></div>
        <button class="arrow arrow-right" onclick="scrollNav(400)">&#8250;</button>
    </div>
    
    <main class="bottom-section" id="content-area">
        <div id="questions-container"></div>
        
        <div class="submit-container">
            <button class="submit-btn" onclick="calculateFinalScore()">Submit All Answers</button>
        </div>
    </main>
</div>

<script>
    const nav = document.getElementById('nav-wrapper');
    const content = document.getElementById('questions-container');
    const scoreBox = document.getElementById('final-score-box');
    const scoreVal = document.getElementById('score-val');

    // Define correct answers for demo (Page_Question)
    const answersKey = {
        "q_1_1": "A", "q_1_2": "B", "q_2_1": "C", // etc...
    };

    let userAnswers = JSON.parse(localStorage.getItem('quiz_persistent_data')) || {};

    for (let i = 1; i <= 10; i++) {
        // Create Navigation Buttons
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.id = `btn-${i}`;
        btn.innerText = i;
        btn.onclick = () => goToPage(i);
        nav.appendChild(btn);

        // Create Pages
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${i}`;
        
        for (let j = 1; j <= 4; j++) {
            const qId = `q_${i}_${j}`;
            const savedVal = userAnswers[qId] || "";

            page.innerHTML += `
                <div class="question-block">
                    <div style="font-size: 1.2rem; margin-bottom: 15px; font-weight: 600; color: #1e293b;">
                        Question ${i}.${j}
                    </div>
                    <div class="options-container">
                        ${['A', 'B', 'C', 'D'].map(opt => `
                            <label>
                                <input type="radio" name="${qId}" value="${opt}" 
                                    ${savedVal === opt ? 'checked' : ''} 
                                    onchange="saveToStorage('${qId}', '${opt}')">
                                <span class="option-label">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
        }
        content.appendChild(page);
    }

    function saveToStorage(id, val) {
        userAnswers[id] = val;
        localStorage.setItem('quiz_persistent_data', JSON.stringify(userAnswers));
    }

    function calculateFinalScore() {
        let score = 0;
        // Example: logic matches userAnswers against answersKey
        // For this demo, let's just count total answered
        score = Object.keys(userAnswers).length;
        
        scoreVal.innerText = score;
        scoreBox.style.display = 'block';
        
        alert("Your progress has been submitted and saved! Total answered: " + score);
    }

    function goToPage(num) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const activeBtn = document.getElementById(`btn-${num}`);
        const activePage = document.getElementById(`page-${num}`);

        activeBtn.classList.add('active');
        activePage.classList.add('active');

        const offset = activeBtn.offsetLeft - (nav.offsetWidth / 2) + (activeBtn.offsetWidth / 2);
        nav.scrollTo({ left: offset, behavior: 'smooth' });
        
        document.getElementById('content-area').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollNav(val) {
        nav.scrollBy({ left: val, behavior: 'smooth' });
    }

    // Initialize first page view
    goToPage(1);
</script>

</body>
</html>
