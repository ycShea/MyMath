<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #0f172a;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 10% Navigation */
        .top-section {
            height: 10vh;
            background: #0f172a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 70px;
        }

        .nav-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth; 
            width: 100%;
            height: 100%;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .nav-wrapper::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex: 0 0 20%;
            height: 80%;
            font-size: 3.5rem;
            font-weight: 900;
            cursor: pointer;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.6);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            border-radius: 12px;
        }

        .nav-btn.active {
            -webkit-text-stroke: 1.5px #60a5fa;
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.9));
            background-color: rgba(96, 165, 250, 0.2);
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: #f1f5f9; 
            color: #0f172a; 
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Bottom 90% Content */
        .bottom-section {
            height: 90vh;
            overflow-y: auto;
            padding: 40px 20px;
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .page.active { display: block; }

        .question-block {
            background: #fff;
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        /* 1/ Options arranged as A B / C D */
        .options-container {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-label {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            text-align: center;
            background: #fff;
        }

        .option-label:hover { background-color: #f1f5f9; }

        input[type="radio"] { display: none; }

        input[type="radio"]:checked + .option-label {
            border-color: #60a5fa;
            background-color: #eff6ff;
            font-weight: 600;
        }

        /* Submit Button Area */
        .submit-container {
            text-align: center;
            padding: 40px 0 100px; /* Space for bottom score badge */
        }

        .btn-submit {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-submit:hover {
            background-color: #059669;
            transform: scale(1.05);
        }

        /* Persistent Score Display */
        .score-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .arrow-left { left: 12px; }
        .arrow-right { right: 12px; }
    </style>
</head>
<body>

<div class="score-display">Total Score: <span id="display-score">0</span></div>

<div class="container">
    <div class="top-section">
        <button class="arrow arrow-left" onclick="scrollNav(-400)">&#8249;</button>
        <div class="nav-wrapper" id="nav-wrapper"></div>
        <button class="arrow arrow-right" onclick="scrollNav(400)">&#8250;</button>
    </div>
    <main class="bottom-section" id="scroll-container">
        <div id="content-area"></div>
        <div class="submit-container">
            <button class="btn-submit" onclick="calculateFinalScore()">Submit Quiz</button>
        </div>
    </main>
</div>

<script>
    const nav = document.getElementById('nav-wrapper');
    const content = document.getElementById('content-area');
    const displayScore = document.getElementById('display-score');
    
    // 3/ Session persistence logic
    // We store the user's answers and the last submitted score
    let userAnswers = JSON.parse(localStorage.getItem('quiz_answers')) || {};
    let lastScore = localStorage.getItem('quiz_score') || 0;

    function initDisplay() {
        displayScore.innerText = lastScore;
    }

    nav.addEventListener('wheel', (evt) => {
        evt.preventDefault();
        nav.scrollLeft += evt.deltaY;
    });
    
    // Creating the quiz structure
    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.id = `btn-${i}`;
        btn.innerText = i;
        btn.onclick = () => goToPage(i);
        nav.appendChild(btn);

        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${i}`;
        
        for (let j = 1; j <= 3; j++) {
            const qId = `q_${i}_${j}`;
            const savedVal = userAnswers[qId] || "";

            page.innerHTML += `
                <div class="question-block">
                    <div style="font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; color: #1e293b;">
                        Question ${i}.${j}: What is the correct answer?
                    </div>
                    <div class="options-container">
                        ${['A', 'B', 'C', 'D'].map(opt => `
                            <label>
                                <input type="radio" name="${qId}" value="${opt}" 
                                    ${savedVal === opt ? 'checked' : ''} 
                                    onchange="saveAnswer('${qId}', '${opt}')">
                                <span class="option-label">Option ${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
        }
        content.appendChild(page);
    }

    function saveAnswer(id, val) {
        userAnswers[id] = val;
        localStorage.setItem('quiz_answers', JSON.stringify(userAnswers));
    }

    // 2/ Submit button logic
    function calculateFinalScore() {
        // Example scoring: 10 points per answer (In a real quiz, you'd check against a key)
        const totalAnswered = Object.keys(userAnswers).length;
        const score = totalAnswered * 10; 
        
        lastScore = score;
        displayScore.innerText = lastScore;
        localStorage.setItem('quiz_score', lastScore);
        
        alert("Answers submitted! Your score is: " + score);
    }

    function goToPage(num) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const activeBtn = document.getElementById(`btn-${num}`);
        const activePage = document.getElementById(`page-${num}`);

        activeBtn.classList.add('active');
        activePage.classList.add('active');

        const offset = activeBtn.offsetLeft - (nav.offsetWidth / 2) + (activeBtn.offsetWidth / 2);
        nav.scrollTo({ left: offset, behavior: 'smooth' });
        document.getElementById('scroll-container').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollNav(val) {
        nav.scrollBy({ left: val, behavior: 'smooth' });
    }

    // Run on refresh
    initDisplay();
    goToPage(1);
</script>

</body>
</html>
