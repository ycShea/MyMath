<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: #0f172a;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 10% Navigation */
        .top-section {
            height: 10vh;
            background: #0f172a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 70px;
        }

        .nav-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth; 
            width: 100%;
            height: 100%;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .nav-wrapper::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            flex: 0 0 20%;
            height: 100%;
            margin: 0 5px;
            font-size: 3.5rem;
            font-weight: 900;
            cursor: pointer;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.6);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .nav-btn:hover {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 1);
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .nav-btn.active {
            -webkit-text-stroke: 1.5px #60a5fa;
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.5));
        }

        /* Bright Pale Arrows */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            /* Pale, high-contrast background */
            background: #f1f5f9; 
            /* Dark icon for visibility against pale background */
            color: #0f172a; 
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .arrow:hover { 
            background: #fff;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .arrow:active {
            transform: translateY(-50%) scale(0.95);
        }

        .arrow-left { left: 12px; }
        .arrow-right { right: 12px; }

        /* Bottom 90% Content Area */
        .bottom-section {
            height: 90vh;
            overflow-y: auto;
            padding: 40px 20px;
            background-color: #f8fafc;
            scroll-behavior: smooth;
        }

        .page {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .page.active {
            display: block;
        }

        .question-block {
            background: #fff;
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        .img-placeholder {
            width: 100%;
            background-color: #f1f5f9;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            border-radius: 12px;
            font-weight: 500;
        }

        .text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #334155;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-section">
        <button class="arrow arrow-left" onclick="scrollNav(-400)" aria-label="Scroll Left">&#8249;</button>
        <div class="nav-wrapper" id="nav-wrapper"></div>
        <button class="arrow arrow-right" onclick="scrollNav(400)" aria-label="Scroll Right">&#8250;</button>
    </div>
    <main class="bottom-section" id="content-area"></main>
</div>

<script>
    const nav = document.getElementById('nav-wrapper');
    const content = document.getElementById('content-area');

    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.id = `btn-${i}`;
        btn.innerText = i;
        btn.onclick = () => goToPage(i);
        nav.appendChild(btn);

        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${i}`;
        
        for (let j = 1; j <= 8; j++) {
            const h = Math.floor(Math.random() * 100) + 300;
            page.innerHTML += `
                <div class="question-block">
                    <div class="img-placeholder" style="height:${h}px">Asset ${i}.${j}</div>
                    <div class="text">
                        <strong>Enhanced Interface ${i}</strong><br>
                        Navigation utilizes high-contrast pale arrows for visibility on dark backgrounds.
                    </div>
                </div>`;
        }
        content.appendChild(page);
    }

    function goToPage(num) {
        const currentActiveBtn = document.querySelector('.nav-btn.active');
        if (currentActiveBtn && currentActiveBtn.id === `btn-${num}`) return;

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const activeBtn = document.getElementById(`btn-${num}`);
        const activePage = document.getElementById(`page-${num}`);

        activeBtn.classList.add('active');
        activePage.classList.add('active');

        const offset = activeBtn.offsetLeft - (nav.offsetWidth / 2) + (activeBtn.offsetWidth / 2);
        nav.scrollTo({ left: offset, behavior: 'smooth' });
        content.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollNav(val) {
        nav.scrollBy({ left: val, behavior: 'smooth' });
    }

    goToPage(1);
</script>

</body>
</html>
