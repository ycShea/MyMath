<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: sans-serif;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 1/3 Navigation */
        .top-section {
            height: 33.33vh;
            background-color: #fff;
            border-bottom: 2px solid #ccc;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 60px;
        }

        .nav-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            width: 100%;
            height: 100%;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .nav-wrapper::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            flex: 0 0 20%; /* 1/5 of width */
            height: 80%;
            margin: 0 10px;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ddd;
            background-color: #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: #888;
        }

        .nav-btn.active {
            background-color: #007bff;
            color: #fff;
            border-color: #0056b3;
            transform: scale(1.05);
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.5rem;
        }

        .arrow-left { left: 5px; }
        .arrow-right { right: 5px; }

        /* Bottom 2/3 Content */
        .bottom-section {
            height: 66.67vh;
            overflow-y: auto;
            padding: 20px;
            background-color: #fff;
        }

        .page {
            display: none;
            max-width: 800px;
            margin: 0 auto;
        }

        .page.active {
            display: block;
        }

        .question-block {
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .img-placeholder {
            width: 100%;
            background-color: #ddd;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            border-radius: 5px;
        }

        .text {
            font-size: 1.2rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-section">
        <button class="arrow arrow-left" onclick="scrollNav(-300)">&#10094;</button>
        <div class="nav-wrapper" id="nav-wrapper"></div>
        <button class="arrow arrow-right" onclick="scrollNav(300)">&#10095;</button>
    </div>
    <main class="bottom-section" id="content-area"></main>
</div>

<script>
    const nav = document.getElementById('nav-wrapper');
    const content = document.getElementById('content-area');

    for (let i = 1; i <= 10; i++) {
        // Nav Buttons
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.id = `btn-${i}`;
        btn.innerText = i;
        btn.onclick = () => goToPage(i);
        nav.appendChild(btn);

        // Pages
        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${i}`;
        
        for (let j = 1; j <= 8; j++) {
            const h = Math.floor(Math.random() * 300) + 200;
            page.innerHTML += `
                <div class="question-block">
                    <div class="img-placeholder" style="height:${h}px">Image ${i}.${j}</div>
                    <div class="text">Question ${i}.${j}: Scrolling content goes here. Variable image height adjusts page length.</div>
                </div>`;
        }
        content.appendChild(page);
    }

    function goToPage(num) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const activeBtn = document.getElementById(`btn-${num}`);
        activeBtn.classList.add('active');
        document.getElementById(`page-${num}`).classList.add('active');

        // Center Button
        const offset = activeBtn.offsetLeft - (nav.offsetWidth / 2) + (activeBtn.offsetWidth / 2);
        nav.scrollTo({ left: offset, behavior: 'smooth' });

        content.scrollTop = 0;
    }

    function scrollNav(val) {
        nav.scrollBy({ left: val, behavior: 'smooth' });
    }

    goToPage(1);
</script>

</body>
</html>
