<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: sans-serif;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top 10% Navigation */
        .top-section {
            height: 10vh;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 50px;
        }

        .nav-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;   /* key fix: smooth scroll on the element itself */
            width: 100%;
            height: 100%;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .nav-wrapper::-webkit-scrollbar {
            display: none;
        }

        .nav-btn {
            flex: 0 0 20%;
            height: 70%;
            margin: 0 10px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid #eee;
            background-color: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.4s ease,
                        color 0.4s ease,
                        border-color 0.4s ease,
                        transform 0.3s ease;
            color: #bbb;
        }

        .nav-btn.active {
            background-color: #007bff;
            color: #fff;
            border-color: #0056b3;
            transform: scale(1.05);
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }

        .arrow:hover { opacity: 0.8; }
        .arrow-left { left: 5px; }
        .arrow-right { right: 5px; }

        /* Bottom 90% Content Area */
        .bottom-section {
            height: 90vh;
            overflow-y: auto;
            padding: 30px;
            background-color: #fff;
            scroll-behavior: smooth;
            position: relative;
        }

        .page {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page.active {
            display: block;
        }

        .question-block {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .img-placeholder {
            width: 100%;
            background-color: #eee;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            border-radius: 8px;
        }

        .text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>
7
<div class="container">
    <div class="top-section">
        <button class="arrow arrow-left" onclick="scrollNav(-400)">&#10094;</button>
        <div class="nav-wrapper" id="nav-wrapper"></div>
        <button class="arrow arrow-right" onclick="scrollNav(400)">&#10095;</button>
    </div>
    <main class="bottom-section" id="content-area"></main>
</div>

<script>
    const nav = document.getElementById('nav-wrapper');
    const content = document.getElementById('content-area');

    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.id = `btn-${i}`;
        btn.innerText = i;
        btn.onclick = () => goToPage(i);
        nav.appendChild(btn);

        const page = document.createElement('div');
        page.className = 'page';
        page.id = `page-${i}`;

        for (let j = 1; j <= 8; j++) {
            const h = Math.floor(Math.random() * 200) + 150;
            page.innerHTML += `
                <div class="question-block">
                    <div class="img-placeholder" style="height:${h}px">Asset ${i}.${j}</div>
                    <div class="text">Question ${i}.${j}: Analysis content area.</div>
                </div>`;
        }
        content.appendChild(page);
    }

    function goToPage(num) {
        const currentActiveBtn = document.querySelector('.nav-btn.active');
        if (currentActiveBtn && currentActiveBtn.id === `btn-${num}`) return;

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        const activeBtn = document.getElementById(`btn-${num}`);
        const activePage = document.getElementById(`page-${num}`);

        activeBtn.classList.add('active');
        activePage.classList.add('active');

        // Smooth scroll the nav bar to centre the active button
        const btnWidth  = activeBtn.offsetWidth;
        const btnLeft   = activeBtn.offsetLeft;
        const wrapperWidth = nav.offsetWidth;

        nav.scrollTo({
            left: btnLeft - (wrapperWidth / 2) + (btnWidth / 2),
            behavior: 'smooth'
        });

        // Smooth reset content scroll to top
        content.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollNav(val) {
        nav.scrollBy({ left: val, behavior: 'smooth' });
    }

    // Initial load
    goToPage(1);
</script>

</body>
</html>
